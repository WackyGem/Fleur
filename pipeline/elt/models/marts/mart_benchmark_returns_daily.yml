version: 2

models:
  - name: mart_benchmark_returns_daily
    description: 组合绩效 benchmark 日收益 mart 薄封装；作为 worker 读取 benchmark daily return 的稳定入口。
    config:
      meta:
        grain_zh: 每个 benchmark 指数、每个交易日一行。
        business_logic_zh:
          - 仅从 int_benchmark_returns_daily 透传 security_code、trade_date 和 return_daily。
          - 不透出 close_price / prev_close_price；价格审计留在 int_benchmark_returns_daily。
          - 不在 mart 层派生窗口级累计收益、年化收益或绩效指标。
          - benchmark_return_basis 为 price_index，由设计文档和 portfolio_metric_config 固定。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
          - relationships:
              arguments:
                to: ref('int_benchmark_basic_snapshot')
                field: security_code

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: return_daily
        description: benchmark 价格指数简单日收益，透传自 int_benchmark_returns_daily。
        data_type: Nullable(Float64)
