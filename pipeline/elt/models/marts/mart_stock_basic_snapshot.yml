version: 2

models:
  - name: mart_stock_basic_snapshot
    description: A 股股票基础显示信息 mart 当前快照，仅用于按证券代码补齐页面展示名称和交易所代码。
    config:
      meta:
        grain_zh: 每证券一行。
        business_logic_zh:
          - 从 int_stock_basic_snapshot 透传证券代码、证券简称和交易所代码。
          - 仅透出上述三列，不增加其他分类字段。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - unique
          - cn_security_code_format

      - name: security_name
        description: BaoStock 当前快照证券简称，用于 Racingline 和 Rearview preview 结果显示。
        data_type: String

      - name: exchange_code
        description: "{{ doc('field_exchange_code') }}"
        data_type: LowCardinality(String)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - SH
                  - SZ
                  - BJ
