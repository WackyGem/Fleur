version: 2

models:
  - name: mart_stock_basic_snapshot
    description: A 股股票基础显示信息 mart 当前快照，仅用于按证券代码补齐页面展示名称、交易所代码和交易板块。
    config:
      meta:
        grain_zh: 每证券一行。
        business_logic_zh:
          - 从 int_stock_basic_snapshot 透传证券代码、证券简称、交易所代码和交易板块。
          - security_board 是 A 股交易板块，不是行业、概念或地域分组。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - unique
          - cn_security_code_format

      - name: security_name
        description: BaoStock 当前快照证券简称，用于 Racingline 和 Rearview preview 结果显示。
        data_type: String

      - name: exchange_code
        description: "{{ doc('field_exchange_code') }}"
        data_type: LowCardinality(String)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - SH
                  - SZ
                  - BJ

      - name: security_board
        description: A 股交易板块，用于 Racingline preview 展示证券所属交易板块；不是行业、概念或地域分类。
        data_type: LowCardinality(Nullable(String))
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - sse_main_board
                  - szse_main_board
                  - chinext
                  - star_market
