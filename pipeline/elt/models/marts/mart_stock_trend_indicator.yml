version: 2

models:
  - name: mart_stock_trend_indicator
    description: A 股股票日频趋势指标 mart；整合 MA、BOLL 和 MACD intermediate wrapper，不在 mart 层重写技术指标公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 以 int_stock_ma_daily 为左表，保留价格 MA、组合 MA 和双重 EMA 指标的完整主键集合。
          - 通过 int_stock_boll_daily 左连接 BOLL 字段，通过 int_stock_macd_daily 左连接 MACD 字段。
          - 不选择 volume_ma_* 均量字段；均量归属 mart_stock_volume_indicator。
          - MACD 字段来自 int_stock_macd_daily，只暴露 macd_dif、macd_dea 和 macd_histogram，不暴露内部递推状态列。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: price_ma_3
        description: 3-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_5
        description: 5-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_6
        description: 6-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_10
        description: 10-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_12
        description: 12-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_14
        description: 14-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_20
        description: 20-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_24
        description: 24-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_28
        description: 28-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_57
        description: 57-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_60
        description: 60-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_114
        description: 114-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_ma_250
        description: 250-valid-close simple moving average based on close_price_forward_adj.
        data_type: Nullable(Float64)

      - name: price_avg_ma_3_6_12_24
        description: Average of price_ma_3, price_ma_6, price_ma_12, and price_ma_24; NULL when any component is NULL.
        data_type: Nullable(Float64)

      - name: price_avg_ma_14_28_57_114
        description: Average of price_ma_14, price_ma_28, price_ma_57, and price_ma_114; NULL when any component is NULL.
        data_type: Nullable(Float64)

      - name: price_ema2_10
        description: Double EMA EMA(EMA(close_price_forward_adj, 10), 10) with SMA startup; first non-NULL at the 19th valid close.
        data_type: Nullable(Float64)

      - name: boll_mid_10_1p5
        description: BOLL(10, 1.5) middle band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: boll_up_10_1p5
        description: BOLL(10, 1.5) upper band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: boll_dn_10_1p5
        description: BOLL(10, 1.5) lower band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: boll_mid_20_2
        description: BOLL(20, 2) middle band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: boll_up_20_2
        description: BOLL(20, 2) upper band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: boll_dn_20_2
        description: BOLL(20, 2) lower band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: boll_mid_50_2p5
        description: BOLL(50, 2.5) middle band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: boll_up_50_2p5
        description: BOLL(50, 2.5) upper band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: boll_dn_50_2p5
        description: BOLL(50, 2.5) lower band from int_stock_boll_daily.
        data_type: Nullable(Float64)

      - name: macd_dif
        description: MACD(12,26,9) DIF, EMA(12) - EMA(26), based on close_price_forward_adj and sourced from int_stock_macd_daily.
        data_type: Nullable(Float64)

      - name: macd_dea
        description: MACD(12,26,9) DEA signal line, EMA(DIF, 9) with SMA startup and sourced from int_stock_macd_daily.
        data_type: Nullable(Float64)

      - name: macd_histogram
        description: Standard MACD histogram, macd_dif - macd_dea; not the doubled 2 * (DIF - DEA) variant.
        data_type: Nullable(Float64)
