version: 2

models:
  - name: mart_portfolio_performance_metric_rank
    description: 跨 run 的组合绩效指标长表排名；仅在相同 config、benchmark、window 与 metric 下进行对比排名。
    config:
      meta:
        grain_zh: 每个 run、attempt、benchmark、window、metric_name 一行排名结果。
        business_logic_zh:
          - 只纳入 metric-level status = succeeded 且 metric_value 非 NULL 的指标。
          - 按 config_hash、security_code、window_key、metric_name 分组排名，避免不同口径混排。
          - beta 在 catalog 中 rank_direction = none，第一版不产出排名。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - portfolio_run_id
              - result_attempt_id
              - security_code
              - window_key
              - metric_name
    columns:
      - name: portfolio_run_id
        description: 组合 run 标识符。
        data_type: String
        data_tests:
          - not_null

      - name: result_attempt_id
        description: 仅追加的 result attempt 标识符。
        data_type: String
        data_tests:
          - not_null

      - name: source_run_id
        description: 产出组合输入的筛选 source run 标识符。
        data_type: String

      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: window_key
        description: 绩效指标窗口键。
        data_type: String
        data_tests:
          - not_null

      - name: window_start
        description: 绩效指标窗口起始日期；full_period 等无显式窗口边界的指标允许为 NULL。
        data_type: Nullable(Date)

      - name: window_end
        description: 绩效指标窗口结束日期；full_period 等无显式窗口边界的指标允许为 NULL。
        data_type: Nullable(Date)

      - name: config_hash
        description: 规范化指标配置字段的 SHA-256 哈希。
        data_type: String
        data_tests:
          - not_null

      - name: metric_name
        description: 绩效指标字段名。
        data_type: String
        data_tests:
          - not_null

      - name: metric_value
        description: 该指标的数值；已过滤掉 NULL，仅保留非 NULL 指标参与排名。
        data_type: Nullable(Float64)
        data_tests:
          - not_null

      - name: rank_direction
        description: 来自 int_portfolio_performance_metric_rank_catalog 的排名方向。
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [asc, desc]

      - name: metric_rank
        description: 在 config_hash、benchmark、window 与 metric 分组内的 dense rank 排名。
        data_type: UInt64
        data_tests:
          - not_null

      - name: reason_code
        description: 该指标 metric_status 的原因码，来自 int_portfolio_performance_metric_status。
        data_type: String
        data_tests:
          - not_null
