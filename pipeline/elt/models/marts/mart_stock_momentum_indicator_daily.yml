version: 2

models:
  - name: mart_stock_momentum_indicator_daily
    description: A 股股票日频动量指标 mart；整合 RSI 和 KDJ intermediate wrapper，不从 mart_stock_quotes_daily 读取 KDJ，也不在 mart 层重写公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 以 int_stock_rsi_daily 为左表，保留 RSI 指标的完整主键集合。
          - 通过 int_stock_kdj_daily 左连接 canonical KDJ(9,3,3) 字段，并统一添加 kdj_ 前缀。
          - RSI 和 KDJ 的 NULL warm-up 语义完全沿用 upstream wrapper。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: rsi_6
        description: 基于 close_price_forward_adj 的 RSI(6)，使用 Wilder 平滑；非 NULL 值必须在 [0, 100] 范围内。
        data_type: Nullable(Float64)

      - name: rsi_12
        description: 基于 close_price_forward_adj 的 RSI(12)，使用 Wilder 平滑；非 NULL 值必须在 [0, 100] 范围内。
        data_type: Nullable(Float64)

      - name: rsi_14
        description: 基于 close_price_forward_adj 的 RSI(14)，使用 Wilder 平滑；非 NULL 值必须在 [0, 100] 范围内。
        data_type: Nullable(Float64)

      - name: rsi_24
        description: 基于 close_price_forward_adj 的 RSI(24)，使用 Wilder 平滑；非 NULL 值必须在 [0, 100] 范围内。
        data_type: Nullable(Float64)

      - name: rsi_25
        description: 基于 close_price_forward_adj 的 RSI(25)，使用 Wilder 平滑；非 NULL 值必须在 [0, 100] 范围内。
        data_type: Nullable(Float64)

      - name: rsi_50
        description: 基于 close_price_forward_adj 的 RSI(50)，使用 Wilder 平滑；第 51 个有效收盘价起首次非 NULL。
        data_type: Nullable(Float64)

      - name: kdj_rsv
        description: KDJ RSV 值，来自 int_stock_kdj_daily；窗口不足、缺价或价格异常时允许为 NULL。
        data_type: Nullable(Float64)

      - name: kdj_k_value
        description: KDJ K 值，来自 int_stock_kdj_daily；RSV 不可用时允许为 NULL。
        data_type: Nullable(Float64)

      - name: kdj_d_value
        description: KDJ D 值，来自 int_stock_kdj_daily；RSV 不可用时允许为 NULL。
        data_type: Nullable(Float64)

      - name: kdj_j_value
        description: KDJ J 值，来自 int_stock_kdj_daily；RSV 不可用时允许为 NULL。
        data_type: Nullable(Float64)
