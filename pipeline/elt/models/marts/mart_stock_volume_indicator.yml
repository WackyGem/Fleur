version: 2

models:
  - name: mart_stock_volume_indicator
    description: A 股股票日频成交量形指标 mart；只暴露由 int_stock_ma_daily 提供的均量字段，不混入价格趋势或动量指标。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 以 int_stock_ma_daily 为唯一上游，只选择 volume_ma_5、volume_ma_10、volume_ma_20 和 volume_ma_60。
          - 均量基于未复权日行情 volume，0 成交量是有效输入。
          - 不选择价格 MA、BOLL、MACD、RSI、KDJ、行情、估值、财务或基础信息字段。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: volume_ma_5
        description: 5-valid-volume simple moving average based on int_stock_quotes_daily_unadj.volume; 0 volume is a valid input and warm-up rows may be NULL.
        data_type: Nullable(Float64)

      - name: volume_ma_10
        description: 10-valid-volume simple moving average based on int_stock_quotes_daily_unadj.volume; 0 volume is a valid input and warm-up rows may be NULL.
        data_type: Nullable(Float64)

      - name: volume_ma_20
        description: 20-valid-volume simple moving average based on int_stock_quotes_daily_unadj.volume; 0 volume is a valid input and warm-up rows may be NULL.
        data_type: Nullable(Float64)

      - name: volume_ma_60
        description: 60-valid-volume simple moving average based on int_stock_quotes_daily_unadj.volume; 0 volume is a valid input and warm-up rows may be NULL.
        data_type: Nullable(Float64)
