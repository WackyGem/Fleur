        data_type: Nullable(Float64)
      - name: change_reason_explain
        description: 变动原因详细说明。
        data_type: LowCardinality(String)
      - name: limited_h_shares_ratio
        description: 限售H股比例（%）。
        data_type: Nullable(Float64)
      - name: limited_h_shares_change
        description: 限售H股变动量。
        data_type: Nullable(Float64)
      - name: is_free_window
        description: 是否为自由流通窗口。
