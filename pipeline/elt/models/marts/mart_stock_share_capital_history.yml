        data_type: Date
        data_tests:
          - not_null
      - name: listing_date
        description: 上市流通日期。
        data_type: Date
        data_tests:
          - not_null
      - name: limited_shares_change
        description: 限售股变动量。
        data_type: Nullable(Float64)
      - name: unlimited_shares_change
        description: 流通股变动量。
        data_type: Nullable(Float64)
      - name: total_shares_change
        description: 总股本变动量。
        data_type: Nullable(Float64)
      - name: listed_a_shares_change
        description: 已上市流通A股变动量。
        data_type: Nullable(Float64)
      - name: limited_a_shares_change
        description: 限售A股变动量。
        data_type: Nullable(Float64)
      - name: b_free_share_change
        description: B股流通变动量。
        data_type: Nullable(Float64)
      - name: h_free_share_change
        description: H股流通变动量。
        data_type: Nullable(Float64)
      - name: limited_b_shares_change
        description: 限售B股变动量。
        data_type: Nullable(Float64)
      - name: non_free_shares_change
        description: 非自由流通股变动量。
        data_type: Nullable(Float64)
      - name: other_free_shares_change
