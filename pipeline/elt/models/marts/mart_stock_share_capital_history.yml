      - name: listed_h_ratio_pc
        description: H 股占已流通比例（%）。
        data_type: Nullable(Float64)
      - name: listed_other_ratio_pc
        description: 其他占已流通比例（%）。
        data_type: Nullable(Float64)
      - name: listed_sum_ratio_pc
