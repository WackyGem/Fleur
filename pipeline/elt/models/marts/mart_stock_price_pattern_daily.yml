version: 2

models:
  - name: mart_stock_price_pattern_daily
    description: A 股股票日频价格行为与 20 根窗口 N 字结构 mart；基于 int_stock_price_pattern_daily 提供消费层稳定接口，不在 mart 层重写价格形态公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 以 int_stock_price_pattern_daily 为唯一上游，保留价格方向、连阳连阴和 20 根窗口 N 字结构字段。
          - 连阳和连阴使用未复权 close_price 与 BaoStock prev_close_price 的 Furnace 计算结果。
          - N 字结构使用前复权 high_price_forward_adj 与 low_price_forward_adj 的 Furnace 计算结果。
          - mart 层只负责消费层物化、字段文档和质量测试，不读取 fleur_calculation 物理表，也不重写指标公式。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: close_direction
        description: 未复权 close_price 相对 BaoStock prev_close_price 的方向；1 为上涨，-1 为下跌，0 为持平，NULL 表示收盘价输入缺失。
        data_type: Nullable(Int8)
        data_tests:
          - accepted_values:
              arguments:
                values: [-1, 0, 1]
              config:
                where: close_direction is not null

      - name: close_up_streak_days
        description: 截至当前行的连续有效上涨天数；close_direction 为 NULL 时为 NULL，当前方向为持平或下跌时为 0。
        data_type: Nullable(UInt16)

      - name: close_down_streak_days
        description: 截至当前行的连续有效下跌天数；close_direction 为 NULL 时为 NULL，当前方向为持平或上涨时为 0。
        data_type: Nullable(UInt16)

      - name: n_structure_20_is_valid
        description: 当 20 根窗口内存在 L1 -> H1 -> L2 结构且当前有效 K 线已从 L2 重新上攻时为 true；仅形成 higher_low 阶段时为 false。
        data_type: Bool

      - name: n_structure_20_stage
        description: N 字结构阶段；none 表示未形成候选结构，higher_low 表示 L2 高于 L1 但尚未重新上攻，rebound 表示已从 L2 反弹，breakout 表示当前有效 K 线最高价突破 H1。
        data_type: String
        data_tests:
          - accepted_values:
              arguments:
                values: ['none', 'higher_low', 'rebound', 'breakout']

      - name: n_structure_20_higher_low_ratio
        description: L2 低点除以 L1 低点；不存在完整 L1/H1/L2 候选结构时为 NULL。
        data_type: Nullable(Float64)

      - name: n_structure_20_pullback_depth
        description: 回撤深度，计算为 (H1 - L2) / (H1 - L1)；不存在完整 L1/H1/L2 候选结构时为 NULL。
        data_type: Nullable(Float64)

      - name: n_structure_20_rebound_ratio
        description: 当前有效 K 线最高价除以 L2 低点；不存在完整 L1/H1/L2 候选结构时为 NULL。
        data_type: Nullable(Float64)
