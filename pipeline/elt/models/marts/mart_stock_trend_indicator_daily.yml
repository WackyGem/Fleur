      - name: price_ma_30
        description: 30-valid-close simple moving average based on close_price_forward_adj; not an alias of price_ma_28.
        data_type: Nullable(Float64)

      - name: prev_price_ma_30
        description: 同一 security_code 上一交易行的 price_ma_30；首个交易行或上一交易行 price_ma_30 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_57
        description: 基于 close_price_forward_adj 的 57 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_57
        description: 同一 security_code 上一交易行的 price_ma_57；首个交易行或上一交易行 price_ma_57 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_60
