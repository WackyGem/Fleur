        data_type: Nullable(Float64)

      - name: price_ma_114
        description: 基于 close_price_forward_adj 的 114 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_114
        description: 同一 security_code 上一交易行的 price_ma_114；首个交易行或上一交易行 price_ma_114 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_250
        description: 基于 close_price_forward_adj 的 250 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_250
        description: 同一 security_code 上一交易行的 price_ma_250；首个交易行或上一交易行 price_ma_250 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_avg_ma_3_6_12_24
        description: Average of price_ma_3, price_ma_6, price_ma_12, and price_ma_24; NULL when any component is NULL.
        data_type: Nullable(Float64)

      - name: prev_price_avg_ma_3_6_12_24
        description: 同一 security_code 上一交易行的 price_avg_ma_3_6_12_24；首个交易行或上一交易行 price_avg_ma_3_6_12_24 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_avg_ma_14_28_57_114
        description: Average of price_ma_14, price_ma_28, price_ma_57, and price_ma_114; NULL when any component is NULL.
        data_type: Nullable(Float64)

      - name: prev_price_avg_ma_14_28_57_114
        description: 同一 security_code 上一交易行的 price_avg_ma_14_28_57_114；首个交易行或上一交易行 price_avg_ma_14_28_57_114 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ema2_10
        description: 双重 EMA EMA(EMA(close_price_forward_adj, 10), 10)，使用 SMA 启动；第 19 个有效收盘价起首次非 NULL。
        data_type: Nullable(Float64)

      - name: prev_price_ema2_10
        description: 同一 security_code 上一交易行的 price_ema2_10；首个交易行或上一交易行 price_ema2_10 为 NULL 时为 NULL。
