version: 2

models:
  - name: mart_stock_trend_indicator_daily
    description: A 股股票日频趋势指标 mart；整合 MA、BOLL 和 MACD intermediate wrapper，不在 mart 层重写技术指标公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 以 int_stock_ma_daily 为左表，保留价格 MA、组合 MA 和双重 EMA 指标的完整主键集合。
          - 通过 int_stock_boll_daily 左连接 BOLL 字段，通过 int_stock_macd_daily 左连接 MACD 字段。
          - 不选择 volume_ma_* 均量字段；均量归属 mart_stock_volume_indicator。
          - MACD 字段来自 int_stock_macd_daily，只暴露 macd_dif、macd_dea 和 macd_histogram，不暴露内部递推状态列。
          - 为允许 crossing 的趋势指标输出 prev_* 前值字段；前值定义为同一 security_code 按 trade_date 排序的上一交易行，不是自然日前一日。
          - prev_* 不做填充；首个交易行、上一交易行缺失或上一交易行对应指标为 NULL 时保持 NULL。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: price_ma_3
        description: 基于 close_price_forward_adj 的 3 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_3
        description: 同一 security_code 上一交易行的 price_ma_3；首个交易行或上一交易行 price_ma_3 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_5
        description: 基于 close_price_forward_adj 的 5 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_5
        description: 同一 security_code 上一交易行的 price_ma_5；首个交易行或上一交易行 price_ma_5 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_6
        description: 基于 close_price_forward_adj 的 6 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_6
        description: 同一 security_code 上一交易行的 price_ma_6；首个交易行或上一交易行 price_ma_6 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_10
        description: 基于 close_price_forward_adj 的 10 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_10
        description: 同一 security_code 上一交易行的 price_ma_10；首个交易行或上一交易行 price_ma_10 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_12
        description: 基于 close_price_forward_adj 的 12 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_12
        description: 同一 security_code 上一交易行的 price_ma_12；首个交易行或上一交易行 price_ma_12 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_14
        description: 基于 close_price_forward_adj 的 14 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_14
        description: 同一 security_code 上一交易行的 price_ma_14；首个交易行或上一交易行 price_ma_14 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_20
        description: 基于 close_price_forward_adj 的 20 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_20
        description: 同一 security_code 上一交易行的 price_ma_20；首个交易行或上一交易行 price_ma_20 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_24
        description: 基于 close_price_forward_adj 的 24 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: prev_price_ma_24
        description: 同一 security_code 上一交易行的 price_ma_24；首个交易行或上一交易行 price_ma_24 为 NULL 时为 NULL。
        data_type: Nullable(Float64)

      - name: price_ma_28
