version: 2

models:
  - name: mart_index_quotes_daily
    description: 指数日频行情 mart；从 intermediate 层透传指数 OHLC、前收、成交量、成交金额和简单日收益。
    config:
      meta:
        grain_zh: 每指数、交易日一行。
        business_logic_zh:
          - 仅从 int_index_quotes_daily 透传指数日频行情字段，保留其 security_code、trade_date 粒度。
          - return_daily 来自 int_index_quotes_daily，mart 层不重算日收益。
          - 不扩展指数 universe，不补齐行情缺口，不合并 benchmark 子集配置。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
          - relationships:
              arguments:
                to: ref('mart_index_basic_snapshot')
                field: security_code

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: open_price
        description: 指数交易日开盘点位，透传自 int_index_quotes_daily。
        data_type: Nullable(Float64)

      - name: high_price
        description: 指数交易日最高点位，透传自 int_index_quotes_daily。
        data_type: Nullable(Float64)

      - name: low_price
        description: 指数交易日最低点位，透传自 int_index_quotes_daily。
        data_type: Nullable(Float64)

      - name: close_price
        description: 指数交易日收盘点位，透传自 int_index_quotes_daily。
        data_type: Nullable(Float64)

      - name: prev_close_price
        description: BaoStock 原始 preclose 口径的指数前收盘点位，透传自 int_index_quotes_daily。
        data_type: Nullable(Float64)

      - name: return_daily
        description: 价格指数简单日收益，透传自 int_index_quotes_daily；mart 层不重算。
        data_type: Nullable(Float64)

      - name: volume
        description: 指数交易日成交量，沿用 BaoStock source-local 口径，透传自 int_index_quotes_daily。
        data_type: Nullable(Int64)

      - name: amount
        description: 指数交易日成交金额，沿用 BaoStock source-local 口径，透传自 int_index_quotes_daily。
        data_type: Nullable(Float64)
