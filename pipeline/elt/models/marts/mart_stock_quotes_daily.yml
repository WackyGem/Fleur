version: 2

models:
  - name: mart_stock_quotes_daily
    description: A 股股票日频行情 mart 宽表；以未复权日行情为主事实表，透传交易、市值、股本和股息率字段，并按交易日 as-of 补充最近财报期估值指标。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 以 int_stock_quotes_daily_unadj 为左表，保留其完整主键集合和交易日粒度。
          - 交易指标、市值、股本和股息率字段只从 int_stock_quotes_daily_unadj 透传，不在 mart 层重算。
          - 财报期估值字段按 security_code 和最近 report_date <= trade_date 从 int_stock_financial_valuation as-of 取值。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: open_price
        description: 交易日未复权开盘价。
        data_type: Nullable(Float64)

      - name: high_price
        description: 交易日未复权最高价。
        data_type: Nullable(Float64)

      - name: low_price
        description: 交易日未复权最低价。
        data_type: Nullable(Float64)

      - name: close_price
        description: 交易日未复权收盘价。
        data_type: Nullable(Float64)

      - name: prev_close_price
        description: BaoStock 原始 preclose 口径的前收盘价。
        data_type: Nullable(Float64)

      - name: prev_close_price_unadj
        description: 当前证券在前一 A 股交易日的未复权收盘价；首个交易日、前一交易日无行情或 source 缺口时为 NULL。
        data_type: Nullable(Float64)

      - name: volume
        description: 交易日成交量，0 值保留。
        data_type: Nullable(Int64)

      - name: amount
        description: 交易日成交金额，单位沿用 BaoStock source-local 口径。
        data_type: Nullable(Float64)

      - name: turnover_rate
        description: 换手率，百分数口径，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: turnover_rate_actual
        description: 实际换手率，使用 A 股自由流通股本作分母，百分数口径，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: pct_amplitude
        description: 振幅，百分数口径，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: pct_change
        description: 涨跌幅，百分数口径，来自 int_stock_quotes_daily_unadj；允许为负值。
        data_type: Nullable(Float64)

      - name: limit_up_price
        description: 基于板块、ST 状态和 BaoStock preclose 口径前收盘价派生的涨停价，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: limit_down_price
        description: 基于板块、ST 状态和 BaoStock preclose 口径前收盘价派生的跌停价，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: a_market_cap
        description: A 股市值，单位元，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: a_float_market_cap
        description: A 股流通市值，单位元，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: a_free_float_market_cap
        description: A 股自由流通市值，单位元，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: a_shares
        description: A 股股本，单位股，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: a_float_shares
        description: A 股流通股本，单位股，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: a_free_float_shares
        description: A 股自由流通股本估算值，单位股，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: pe_static
        description: 静态市盈率，按最近 report_date <= trade_date 的财报期估值 as-of 取值。
        data_type: Nullable(Float64)

      - name: pe_ttm
        description: TTM 市盈率，按最近 report_date <= trade_date 的财报期估值 as-of 取值。
        data_type: Nullable(Float64)

      - name: pe_forecast
        description: 动态市盈率，按最近 report_date <= trade_date 的财报期估值 as-of 取值。
        data_type: Nullable(Float64)

      - name: pb_mrq
        description: MRQ 市净率，按最近 report_date <= trade_date 的财报期估值 as-of 取值。
        data_type: Nullable(Float64)

      - name: book_value_per_share
        description: 每股净资产，按最近 report_date <= trade_date 的财报期估值 as-of 取值。
        data_type: Nullable(Float64)

      - name: roe
        description: ROE，按最近 report_date <= trade_date 的财报期估值 as-of 取值；比率口径，不乘以 100。
        data_type: Nullable(Float64)

      - name: roae
        description: ROAE，按最近 report_date <= trade_date 的财报期估值 as-of 取值；比率口径，不乘以 100。
        data_type: Nullable(Float64)

      - name: dy_static
        description: 静态股息率，百分数口径，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: dy_ttm
        description: TTM 股息率，百分数口径，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: is_suspend
        description: 是否停牌；由上游 BaoStock staging 从 trade_status = 0 派生后经 int_stock_quotes_daily_unadj 透传。
        data_type: Bool
        data_tests:
          - not_null

      - name: is_st
        description: 是否 ST 或风险警示，沿用 BaoStock source-local 口径。
        data_type: Nullable(Bool)
