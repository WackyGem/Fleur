version: 2

models:
  - name: int_stock_macd_daily
    description: A 股股票日频 MACD intermediate wrapper；包装 Furnace/Dagster 物化的 calculation 层结果，不在 dbt 中重算 MACD 公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 上游物理表为 fleur_calculation.calc_stock_macd_daily，由 Furnace 计算、Dagster 调度和观测。
          - 第一版固定使用 close_price_forward_adj 前复权收盘价口径和 MACD(12,26,9) 参数。
          - EMA(12)、EMA(26) 和 DEA(9) 均使用 SMA 启动；close 为空的交易日保留输出行，但业务字段为 NULL 且不推进递推状态。
          - macd_histogram = macd_dif - macd_dea，不使用 2 * (DIF - DEA) 变体。
          - dbt wrapper 只暴露业务 MACD 字段；ema_fast_state_12、ema_slow_state_26 和 macd_dea_state 为 Furnace 内部状态列，不在本模型暴露。
          - dbt 不重写 MACD 公式，只提供 intermediate wrapper、字段文档和下游消费契约。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: macd_dif
        description: MACD(12,26,9) DIF 快线，EMA(12) - EMA(26)，基于 close_price_forward_adj；有效 close 不足 26 个或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: macd_dea
        description: MACD(12,26,9) DEA 慢线，对有效 DIF 做 EMA(9) 平滑并使用 SMA 启动；有效 DIF 不足 9 个或当前 DIF 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: macd_histogram
        description: MACD(12,26,9) 标准柱状图，macd_dif - macd_dea；非 2 倍增强版柱状图。DIF 或 DEA 为空时为 NULL。
        data_type: Nullable(Float64)
