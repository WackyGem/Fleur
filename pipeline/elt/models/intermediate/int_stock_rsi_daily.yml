version: 2

models:
  - name: int_stock_rsi_daily
    description: A 股股票日频 RSI intermediate wrapper；包装 Furnace/Dagster 物化的 calculation 层结果，不在 dbt 中重算 RSI 公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 上游物理表为 fleur_calculation.calc_stock_rsi_daily，由 Furnace 计算、Dagster 调度和观测。
          - 第一版固定使用 close_price_forward_adj 前复权收盘价口径。
          - RSI 使用 Wilder smoothing，启动阶段使用前 n 个有效涨跌幅的 SMA。
          - dbt wrapper 只暴露业务 RSI 字段；avg_gain_*_state 和 avg_loss_*_state 为 Furnace 内部状态列，不在本模型暴露。
          - dbt 不重写 RSI 公式，只提供 intermediate wrapper、字段文档和下游消费契约。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: rsi_6
        description: RSI(6) based on close_price_forward_adj using Wilder smoothing; non-NULL values must be in the [0, 100] range.
        data_type: Nullable(Float64)

      - name: rsi_12
        description: RSI(12) based on close_price_forward_adj using Wilder smoothing; non-NULL values must be in the [0, 100] range.
        data_type: Nullable(Float64)

      - name: rsi_14
        description: RSI(14) based on close_price_forward_adj using Wilder smoothing; non-NULL values must be in the [0, 100] range.
        data_type: Nullable(Float64)

      - name: rsi_24
        description: RSI(24) based on close_price_forward_adj using Wilder smoothing; non-NULL values must be in the [0, 100] range.
        data_type: Nullable(Float64)

      - name: rsi_25
        description: RSI(25) based on close_price_forward_adj using Wilder smoothing; non-NULL values must be in the [0, 100] range.
        data_type: Nullable(Float64)

      - name: rsi_50
        description: RSI(50) based on close_price_forward_adj using Wilder smoothing; first non-NULL at the 51st valid close; non-NULL values must be in the [0, 100] range.
        data_type: Nullable(Float64)
