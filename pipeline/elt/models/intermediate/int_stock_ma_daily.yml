version: 2

models:
  - name: int_stock_ma_daily
    description: A 股股票日频 Moving Average intermediate wrapper；包装 Furnace/Dagster 物化的 calculation 层结果，不在 dbt 中重算 MA/EMA 公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 上游物理表为 fleur_calculation.calc_stock_ma_daily，由 Furnace 计算、Dagster 调度和观测。
          - 价格指标固定使用 close_price_forward_adj 前复权收盘价口径；均量指标固定使用未复权日行情 volume 口径，0 成交量为有效值。
          - MA 窗口按有效输入值计数；EMA 使用前 10 个有效 close 的 SMA 启动。
          - dbt wrapper 只暴露业务字段；price_ema1_10_state 和 price_ema2_10_state 为 Furnace 内部状态列，不在本模型暴露。
          - dbt 不重写 MA/EMA 公式，只提供 intermediate wrapper、字段文档和下游消费契约。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: price_ma_3
        description: 基于 close_price_forward_adj 的 3 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_5
        description: 基于 close_price_forward_adj 的 5 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_6
        description: 基于 close_price_forward_adj 的 6 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_10
        description: 基于 close_price_forward_adj 的 10 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_12
        description: 基于 close_price_forward_adj 的 12 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_14
        description: 基于 close_price_forward_adj 的 14 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_20
        description: 基于 close_price_forward_adj 的 20 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_24
        description: 基于 close_price_forward_adj 的 24 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_28
        description: 基于 close_price_forward_adj 的 28 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_30
        description: 基于 close_price_forward_adj 的 30 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_57
        description: 基于 close_price_forward_adj 的 57 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_60
        description: 基于 close_price_forward_adj 的 60 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_114
        description: 基于 close_price_forward_adj 的 114 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_ma_250
        description: 基于 close_price_forward_adj 的 250 个有效收盘价简单移动平均。
        data_type: Nullable(Float64)

      - name: price_avg_ma_3_6_12_24
        description: Average of price_ma_3, price_ma_6, price_ma_12, and price_ma_24; NULL when any component is NULL.
        data_type: Nullable(Float64)

      - name: price_avg_ma_14_28_57_114
        description: Average of price_ma_14, price_ma_28, price_ma_57, and price_ma_114; NULL when any component is NULL.
        data_type: Nullable(Float64)

      - name: price_ema2_10
        description: 双重 EMA EMA(EMA(close_price_forward_adj, 10), 10)，使用 SMA 启动；第 19 个有效收盘价起首次非 NULL。
        data_type: Nullable(Float64)

      - name: volume_ma_5
        description: 基于 int_stock_quotes_daily_unadj.volume 的 5 个有效成交量简单移动平均；0 成交量是有效输入。
        data_type: Nullable(Float64)

      - name: volume_ma_10
        description: 基于 int_stock_quotes_daily_unadj.volume 的 10 个有效成交量简单移动平均；0 成交量是有效输入。
        data_type: Nullable(Float64)

      - name: volume_ma_20
        description: 基于 int_stock_quotes_daily_unadj.volume 的 20 个有效成交量简单移动平均；0 成交量是有效输入。
        data_type: Nullable(Float64)

      - name: volume_ma_60
        description: 基于 int_stock_quotes_daily_unadj.volume 的 60 个有效成交量简单移动平均；0 成交量是有效输入。
        data_type: Nullable(Float64)
