version: 2

models:
  - name: int_portfolio_trade_metric
    description: Trade quality metric thin wrapper over worker-authored calculation rows.
    config:
      meta:
        grain_zh: 每个 portfolio run、attempt、window 一行。
        business_logic_zh:
          - 上游交易级指标由 Rust worker 基于 closed trade ledger 计算。
          - 交易级指标不重复写入 benchmark-scoped performance metric row。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - portfolio_run_id
              - result_attempt_id
              - window_key
    columns:
      - name: portfolio_run_id
        description: Portfolio run identifier.
        data_type: String
        data_tests:
          - not_null

      - name: result_attempt_id
        description: Append-only result attempt identifier.
        data_type: String
        data_tests:
          - not_null

      - name: window_key
        description: Trade metric window key.
        data_type: String
        data_tests:
          - not_null
