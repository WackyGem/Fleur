version: 2

models:
  - name: int_index_quotes_daily
    description: BaoStock 指数日频价格指数行情 intermediate 模型；一行代表一个指数在一个交易日的行情和简单日收益。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
          - relationships:
              arguments:
                to: ref('int_index_basic_snapshot')
                field: security_code

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: open_price
        description: 指数交易日开盘点位。
        data_type: Nullable(Float64)

      - name: high_price
        description: 指数交易日最高点位。
        data_type: Nullable(Float64)

      - name: low_price
        description: 指数交易日最低点位。
        data_type: Nullable(Float64)

      - name: close_price
        description: 指数交易日收盘点位。
        data_type: Nullable(Float64)

      - name: prev_close_price
        description: BaoStock 原始 preclose 口径的指数前收盘点位。
        data_type: Nullable(Float64)

      - name: return_daily
        description: 价格指数简单日收益，等于 close_price / prev_close_price - 1；前收盘点位缺失或小于等于 0 时为 NULL。
        data_type: Nullable(Float64)

      - name: volume
        description: 指数交易日成交量，沿用 BaoStock source-local 口径。
        data_type: Nullable(Int64)

      - name: amount
        description: 指数交易日成交金额，沿用 BaoStock source-local 口径。
        data_type: Nullable(Float64)
