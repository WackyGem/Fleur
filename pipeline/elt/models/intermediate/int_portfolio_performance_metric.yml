version: 2

models:
  - name: int_portfolio_performance_metric
    description: Portfolio performance metric thin wrapper over worker-authored calculation rows; joins complete portfolio attempts and does not recompute metric formulas.
    config:
      meta:
        grain_zh: 每个 portfolio run、attempt、benchmark、window 一行。
        business_logic_zh:
          - 上游指标由 Rust portfolio worker 写入 fleur_calculation.calc_portfolio_performance_metric。
          - 本模型 inner join portfolio_run_snapshot，只暴露完整写入的 result attempt。
          - dbt 不重算 NAV、daily_return、drawdown 或 12 个绩效指标公式。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - portfolio_run_id
              - result_attempt_id
              - security_code
              - window_key
    columns:
      - name: portfolio_run_id
        description: Portfolio run identifier.
        data_type: String
        data_tests:
          - not_null

      - name: result_attempt_id
        description: Append-only result attempt identifier.
        data_type: String
        data_tests:
          - not_null

      - name: security_code
        description: Benchmark security code.
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: window_key
        description: Performance metric window key.
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [full_period]

      - name: config_hash
        description: SHA-256 hash of the canonical metric config typed fields.
        data_type: String
        data_tests:
          - not_null

      - name: metric_status
        description: Row-level input status for the full metric row.
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - succeeded
                  - insufficient_observations
                  - missing_benchmark
                  - missing_risk_free_rate
                  - invalid_input

      - name: observation_count
        description: Count of aligned portfolio, benchmark, and risk-free daily observations used by worker.
        data_type: UInt32
        data_tests:
          - not_null
