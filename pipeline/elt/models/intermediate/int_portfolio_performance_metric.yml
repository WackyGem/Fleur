version: 2

models:
  - name: int_portfolio_performance_metric
    description: 组合绩效指标薄封装；透传 Rust worker 输出的计算行，关联完整组合 attempt，不重算指标公式。
    config:
      meta:
        grain_zh: 每个 portfolio run、attempt、benchmark、window 一行。
        business_logic_zh:
          - 上游指标由 Rust portfolio worker 写入 fleur_calculation.calc_portfolio_performance_metric。
          - 本模型 inner join portfolio_run_snapshot，只暴露完整写入的 result attempt。
          - dbt 不重算 NAV、daily_return、drawdown 或 12 个绩效指标公式。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - portfolio_run_id
              - result_attempt_id
              - security_code
              - window_key
    columns:
      - name: portfolio_run_id
        description: 组合 run 标识符。
        data_type: String
        data_tests:
          - not_null

      - name: result_attempt_id
        description: 仅追加的 result attempt 标识符。
        data_type: String
        data_tests:
          - not_null

      - name: source_run_id
        description: 产出本组合输入的选股源 run 标识，来自 portfolio_run_snapshot。
        data_type: String

      - name: security_code
        description: benchmark 证券代码。
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: window_key
        description: 绩效指标窗口键。
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [full_period]

      - name: window_start
        description: 指标窗口起始日期；无窗口边界时为 NULL。
        data_type: Nullable(Date)

      - name: window_end
        description: 指标窗口结束日期；无窗口边界时为 NULL。
        data_type: Nullable(Date)

      - name: run_start_date
        description: 组合回测起始日期，来自 portfolio_run_snapshot.start_date。
        data_type: Date

      - name: run_end_date
        description: 组合回测结束日期，来自 portfolio_run_snapshot.end_date。
        data_type: Date

      - name: config_hash
        description: 规范化指标配置字段的 SHA-256 哈希。
        data_type: String
        data_tests:
          - not_null

      - name: metric_status
        description: 整行输入状态。
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - succeeded
                  - insufficient_observations
                  - missing_benchmark
                  - missing_risk_free_rate
                  - invalid_input

      - name: observation_count
        description: worker 对齐使用的组合、benchmark 和无风险利率日频观测数。
        data_type: UInt32
        data_tests:
          - not_null

      - name: holding_period_return
        description: 区间持有期收益率。
        data_type: Nullable(Float64)

      - name: annualized_return
        description: 年化收益率。
        data_type: Nullable(Float64)

      - name: annualized_volatility
        description: 年化波动率。
        data_type: Nullable(Float64)

      - name: max_drawdown
        description: 区间最大回撤。
        data_type: Nullable(Float64)

      - name: calmar_ratio
        description: 卡玛比率，年化收益率除以最大回撤绝对值。
        data_type: Nullable(Float64)

      - name: downside_deviation
        description: 下行标准差。
        data_type: Nullable(Float64)

      - name: sortino_ratio
        description: 索提诺比率。
        data_type: Nullable(Float64)

      - name: sharpe_ratio
        description: 夏普比率。
        data_type: Nullable(Float64)

      - name: information_ratio
        description: 信息比率。
        data_type: Nullable(Float64)

      - name: beta
        description: 相对基准的贝塔系数。
        data_type: Nullable(Float64)

      - name: alpha
        description: 相对基准的詹森阿尔法。
        data_type: Nullable(Float64)

      - name: treynor_ratio
        description: 特雷诺比率。
        data_type: Nullable(Float64)

      - name: computed_at
        description: 指标计算完成时间，由 worker 写入时填入。
        data_type: DateTime
