version: 2
models:
  - name: int_stock_dividend_plan
    description: 股票分红方案 intermediate 透传模型，使用 record key 保留可复现的历史版本唯一性。
    config:
      meta:
        grain_zh: 每证券、每报告期分红方案历史版本一行；同一证券和报告期允许多个版本。
        business_logic_zh:
          - 先对完全相同的规范化 staging 行执行 select distinct。
          - dividend_plan_record_key 基于全部基础字段生成，不用公告标识或报告期分组替代记录唯一性。
          - 不选择所谓最新或正确历史记录，不做分红方案纠错。
    columns:
      - name: dividend_plan_record_key
        description: 分红方案记录键；基于规范化后的全部基础字段和固定 NULL 编码生成，用于保留历史版本记录唯一性。
        data_type: String
        data_tests:
          - not_null
          - unique
      - name: dividend_plan_group_key
        description: 分红方案业务分组键；基于证券代码和报告期标签生成，允许同一分组存在多个历史版本。
        data_type: String
        data_tests:
          - not_null
      - name: security_code
        description: '{{ doc(''field_security_code'') }}'
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
      - name: security_name_abbr
        description: 证券简称。
        data_type: LowCardinality(String)
      - name: notice_date
        description: 公告日期。
        data_type: Date
        data_tests:
          - not_null
      - name: report_period_label
        description: 报告期标签。
        data_type: LowCardinality(String)
        data_tests:
          - not_null
      - name: report_date
        description: '{{ doc(''field_report_date'') }}'
        data_type: Nullable(Date)
      - name: assign_progress
        description: 分配进度。
        data_type: LowCardinality(String)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 董事会预案
                  - 实施方案
                  - 股东大会预案
                  - 预披露
                  - 股东大会否决
                  - 董事会决议未通过
      - name: is_unassign
        description: 是否不分配。
        data_type: Bool
      - name: impl_plan_profile
        description: 分红方案简述。
        data_type: LowCardinality(Nullable(String))
      - name: impl_plan_newprofile
        description: 方案进度简述。
        data_type: LowCardinality(String)
      - name: new_profile
        description: 含税方案文本。
        data_type: LowCardinality(Nullable(String))
      - name: assign_object
        description: 分配对象。
        data_type: LowCardinality(Nullable(String))
      - name: equity_record_date
        description: 股权登记日。
        data_type: Nullable(Date)
      - name: ex_dividend_date
        description: 除权除息日。
        data_type: Nullable(Date)
      - name: pay_cash_date
        description: 派息日。
        data_type: Nullable(Date)
      - name: gmdecision_notice_date
        description: 股东大会决议公告日。
        data_type: Nullable(Date)
      - name: annual_general_meeting_date
        description: 年度股东大会日期。
        data_type: Nullable(Date)
      - name: announcement_identifier
        description: 公告业务标识，来自 staging announcement_identifier。
        data_type: Nullable(String)
        config:
          meta:
            source_columns:
              - source: model
                model: stg_eastmoney__dividend_main
                column: announcement_identifier
      - name: total_dividend
        description: 分红总额。
        data_type: Nullable(Float64)
      - name: total_dividend_a
        description: A 股分红总额。
        data_type: Nullable(Float64)
