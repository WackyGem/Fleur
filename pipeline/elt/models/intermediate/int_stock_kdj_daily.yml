version: 2

models:
  - name: int_stock_kdj_daily
    description: A 股股票日频 RSV/KDJ intermediate wrapper；包装 Furnace/Dagster 物化的 calculation 层结果，不在 dbt 中重算指标公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 上游物理表为 fleur_calculation.calc_stock_kdj_daily，由 Furnace 计算、Dagster 调度和观测。
          - 第一版固定使用前复权价格口径和 canonical KDJ(9,3,3) 参数。
          - 指标字段允许为 NULL；窗口不足、缺价或价格异常时具体指标字段为空，不使用行级 is_valid。
          - dbt 只提供 intermediate wrapper、字段文档和下游消费契约，不重写 RSV/KDJ 公式。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: rsv_window
        description: RSV 滚动窗口；第一版必须为 9。
        data_type: UInt16
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [9]

      - name: k_smoothing
        description: K 平滑分母；第一版必须为 3。
        data_type: UInt16
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [3]

      - name: d_smoothing
        description: D 平滑分母；第一版必须为 3。
        data_type: UInt16
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [3]

      - name: rsv
        description: RSV 值；当前行无完整有效 RSV 窗口时为 NULL。
        data_type: Nullable(Float64)

      - name: k_value
        description: K 值；当前行 RSV 不可用时为 NULL。
        data_type: Nullable(Float64)

      - name: d_value
        description: D 值；当前行 RSV 不可用时为 NULL。
        data_type: Nullable(Float64)

      - name: j_value
        description: J 值；当前行 RSV 不可用时为 NULL。
        data_type: Nullable(Float64)
