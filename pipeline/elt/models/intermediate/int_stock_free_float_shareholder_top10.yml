version: 2
models:
  - name: int_stock_free_float_shareholder_top10
    description: 股票前十大流通股东 intermediate 透传模型，使用业务语义命名承接 stg_eastmoney__freeholders 全字段。
    config:
      meta:
        grain_zh: 每证券、每报告期、每股东排名和持有人一行。
        business_logic_zh:
          - 直接透传对应 EastMoney F10 staging 模型，不做口径合并、历史版本选择或指标重算。
          - 模型名和字段名使用业务语义；受控重命名字段在 meta.source_columns 记录 staging 来源。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - report_date
              - holder_rank
              - holder_identifier
              - holder_name
              - shares_type
    columns:
      - name: security_code
        description: '{{ doc(''field_security_code'') }}'
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
      - name: report_date
        description: '{{ doc(''field_report_date'') }}'
        data_type: Date
        data_tests:
          - not_null
      - name: holder_rank
        description: 股东在东方财富返回的该报告期流通股东名单中的名次；实际 raw 数据存在 11 至 50 的少量名次，不在 staging 层裁剪为 1 至 10。
        data_type: Int64
        data_tests:
          - not_null
      - name: holder_identifier
        description: 持有人业务标识，来自 staging holder_identifier。
        data_type: String
        data_tests:
          - not_null
        config:
          meta:
            source_columns:
              - source: model
                model: stg_eastmoney__freeholders
                column: holder_identifier
      - name: holder_name
        description: 东方财富披露的流通股东名称。
        data_type: String
        data_tests:
          - not_null
      - name: holder_type
        description: 东方财富返回的股东类型或机构类型，保留供应商原始分类文本。
        data_type: LowCardinality(String)
      - name: shares_type
        description: 股东持有股份类别，保留东方财富原始股份类别文本。
        data_type: LowCardinality(String)
        data_tests:
          - not_null
      - name: free_float_hold_shares
        description: 股东持有流通股数量，单位为股。
        data_type: Int64
        data_tests:
          - not_null
      - name: free_float_holdnum_ratio_pct
        description: 股东持有流通股数量占流通股比例，保留东方财富百分比数值而非小数比例。
        data_type: Float64
        data_tests:
          - not_null
      - name: hold_num_change_text
        description: 较上期持股数量变动的原始文本；可为数值文本，也可为“不变”或“新进”。
        data_type: String
        data_tests:
          - not_null
      - name: change_ratio_pct
        description: 较上期持股数量变动比例，保留东方财富百分比数值；当变动文本为“不变”或“新进”时通常为空。
        data_type: Nullable(Float64)
