version: 2

models:
  - name: int_stock_price_pattern_daily
    description: A 股股票日频价格行为与前低-次低结构 intermediate wrapper；包装 Furnace/Dagster 物化的 calculation 层结果，不在 dbt 中重算指标公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 上游物理表为 fleur_calculation.calc_stock_price_pattern_daily，由 Furnace 计算、Dagster 调度和观测。
          - 连阳和连阴使用 int_stock_quotes_daily_unadj.close_price 与 prev_close_price 逐行比较，不使用前复权 close。
          - close_price 或 prev_close_price 为空时方向不可判定，streak 字段为空并打断连续性。
          - 前低-次低结构检测使用 int_stock_quotes_daily_adj.high_price_forward_adj 与 low_price_forward_adj，窗口最多保留最近 20 根有效 high/low 价格柱。
          - n_structure_20_is_valid 仅表示 second_low_ratio > 1.0；ratio 为空时为 false。
          - dbt 只提供 intermediate wrapper、字段文档和下游消费契约，不重写价格行为或结构检测公式。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: close_direction
        description: 未复权 close_price 相对 BaoStock prev_close_price 的方向；1 为上涨，-1 为下跌，0 为持平，NULL 表示收盘价输入缺失。
        data_type: Nullable(Int8)
        data_tests:
          - accepted_values:
              arguments:
                values: [-1, 0, 1]
              config:
                where: close_direction is not null

      - name: close_up_streak_days
        description: 截至当前行的连续有效上涨天数；close_direction 为 NULL 时为 NULL，当前方向为持平或下跌时为 0。
        data_type: Nullable(UInt16)

      - name: close_down_streak_days
        description: 截至当前行的连续有效下跌天数；close_direction 为 NULL 时为 NULL，当前方向为持平或上涨时为 0。
        data_type: Nullable(UInt16)

      - name: n_structure_20_valid_bars
        description: 20 根结构窗口使用的近期有效前复权最高/最低价 K 线数量。
        data_type: UInt16

      - name: n_structure_20_high_date
        description: 近期 20 根有效最高/最低价 K 线中第一个最高 high_price_forward_adj 的交易日。
        data_type: Nullable(Date)

      - name: n_structure_20_high_price
        description: 近期 20 根有效最高/最低价 K 线中的最高 high_price_forward_adj。
        data_type: Nullable(Float64)

      - name: n_structure_20_low_date
        description: 结构窗口左侧（含最高点 K 线）第一个最低 low_price_forward_adj 的交易日。
        data_type: Nullable(Date)

      - name: n_structure_20_low_price
        description: 结构窗口左侧（含最高点 K 线）的最低 low_price_forward_adj。
        data_type: Nullable(Float64)

      - name: n_structure_20_second_low_date
        description: 最高点 K 线右侧之后第一个最低 low_price_forward_adj 的交易日。
        data_type: Nullable(Date)

      - name: n_structure_20_second_low_price
        description: 最高点 K 线右侧之后的最低 low_price_forward_adj。
        data_type: Nullable(Float64)

      - name: n_structure_20_second_low_ratio
        description: n_structure_20_second_low_price 除以 n_structure_20_low_price；次低点不可用时为 NULL。
        data_type: Nullable(Float64)

      - name: n_structure_20_is_valid
        description: 当 n_structure_20_second_low_ratio 严格大于 1.0 时为 true；比率为 NULL 或不大于 1.0 时为 false。
        data_type: Bool
