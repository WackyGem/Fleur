version: 2

models:
  - name: int_stock_boll_daily
    description: A 股股票日频 Bollinger Bands intermediate wrapper；包装 Furnace/Dagster 物化的 calculation 层结果，不在 dbt 中重算布林带公式。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - 上游物理表为 fleur_calculation.calc_stock_boll_daily，由 Furnace 计算、Dagster 调度和观测。
          - 第一版固定使用 close_price_forward_adj 前复权收盘价口径。
          - 布林带窗口按有效 close 计数；close 为空的交易日输出行保留，但布林带字段为空且不推进 rolling window。
          - STD 使用总体标准差，ddof=0，不使用 pandas 默认样本标准差 ddof=1。
          - 第一版固定暴露 BOLL(10, 1.5)、BOLL(20, 2)、BOLL(50, 2.5) 三组 MID/UPPER/LOWER 字段。
          - dbt 不重写布林带公式，只提供 intermediate wrapper、字段文档和下游消费契约。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: boll_mid_10_1p5
        description: BOLL(10, 1.5) 中轨；基于 close_price_forward_adj 的 10 个有效收盘价简单移动平均。有效 close 不足 10 个或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: boll_upper_10_1p5
        description: BOLL(10, 1.5) 上轨；boll_mid_10_1p5 + 1.5 * population STD(close_price_forward_adj, 10)，ddof=0。窗口不足或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: boll_lower_10_1p5
        description: BOLL(10, 1.5) 下轨；boll_mid_10_1p5 - 1.5 * population STD(close_price_forward_adj, 10)，ddof=0。窗口不足或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: boll_mid_20_2
        description: BOLL(20, 2) 中轨；基于 close_price_forward_adj 的 20 个有效收盘价简单移动平均。有效 close 不足 20 个或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: boll_upper_20_2
        description: BOLL(20, 2) 上轨；boll_mid_20_2 + 2 * population STD(close_price_forward_adj, 20)，ddof=0。窗口不足或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: boll_lower_20_2
        description: BOLL(20, 2) 下轨；boll_mid_20_2 - 2 * population STD(close_price_forward_adj, 20)，ddof=0。窗口不足或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: boll_mid_50_2p5
        description: BOLL(50, 2.5) 中轨；基于 close_price_forward_adj 的 50 个有效收盘价简单移动平均。有效 close 不足 50 个或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: boll_upper_50_2p5
        description: BOLL(50, 2.5) 上轨；boll_mid_50_2p5 + 2.5 * population STD(close_price_forward_adj, 50)，ddof=0。窗口不足或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)

      - name: boll_lower_50_2p5
        description: BOLL(50, 2.5) 下轨；boll_mid_50_2p5 - 2.5 * population STD(close_price_forward_adj, 50)，ddof=0。窗口不足或当前 close 为空时为 NULL。
        data_type: Nullable(Float64)
