version: 2

models:
  - name: int_stock_quotes_daily_unadj
    description: A 股股票日频未复权行情 intermediate 模型；只保留 1995-01-01 后恢复 T+1 交易制度时期的行情。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
          - relationships:
              arguments:
                to: ref('int_stock_basic_snapshot')
                field: security_code

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: open_price
        description: 交易日未复权开盘价。
        data_type: Nullable(Float64)

      - name: high_price
        description: 交易日未复权最高价。
        data_type: Nullable(Float64)

      - name: low_price
        description: 交易日未复权最低价。
        data_type: Nullable(Float64)

      - name: close_price
        description: 交易日未复权收盘价。
        data_type: Nullable(Float64)

      - name: prev_close_price
        description: BaoStock 原始 preclose 口径的前收盘价。
        data_type: Nullable(Float64)

      - name: prev_close_price_unadj
        description: 当前证券在前一交易日的未复权收盘价；首个交易日、前一交易日无行情或 source 缺口时为 NULL。
        data_type: Nullable(Float64)

      - name: volume
        description: 交易日成交量，0 值保留。
        data_type: Nullable(Int64)

      - name: amount
        description: 交易日成交金额，单位沿用 BaoStock source-local 口径。
        data_type: Nullable(Float64)

      - name: is_suspend
        description: 是否停牌；由上游 BaoStock staging 从 trade_status = 0 派生后透传。
        data_type: Bool
        data_tests:
          - not_null

      - name: is_st
        description: 是否 ST 或风险警示，沿用 BaoStock source-local 口径。
        data_type: Nullable(Bool)
