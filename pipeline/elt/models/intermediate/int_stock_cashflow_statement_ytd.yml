version: 2
models:
  - name: int_stock_cashflow_statement_ytd
    description: 股票年初至今现金流量表 intermediate 透传模型，使用业务语义命名承接 stg_eastmoney__cashflow_ytd 全字段。
    config:
      meta:
        grain_zh: 每证券、每累计报告期一行。
        business_logic_zh:
          - 直接透传对应 EastMoney F10 staging 模型，不做口径合并、历史版本选择或指标重算。
          - 模型名和字段名使用业务语义；受控重命名字段在 meta.source_columns 记录 staging 来源。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - report_date
    columns:
      - name: security_code
        description: '{{ doc(''field_security_code'') }}'
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
      - name: security_local_code
        description: '{{ doc(''field_security_local_code'') }}'
        data_type: String
        data_tests:
          - not_null
      - name: security_name_abbr
        description: 证券简称。
        data_type: LowCardinality(String)
      - name: org_code
        description: 机构代码。
        data_type: LowCardinality(String)
      - name: org_type
        description: 机构类型。
        data_type: LowCardinality(String)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 通用
      - name: report_date
        description: 报告期。
        data_type: Date
        data_tests:
          - not_null
      - name: report_type
        description: 报告类型。
        data_type: LowCardinality(String)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - 一季报
                  - 中报
                  - 三季报
                  - 年报
      - name: report_date_name
        description: 报告期名称。
        data_type: LowCardinality(String)
      - name: security_type_code
        description: 证券类型代码。
        data_type: LowCardinality(String)
      - name: notice_date
        description: 公告日期。
        data_type: Date
        data_tests:
          - not_null
      - name: update_date
        description: 更新日期。
        data_type: Nullable(Date)
      - name: currency
        description: 现金流量表年初至报告期末金额使用的币种。
        data_type: LowCardinality(Nullable(String))
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - CNY
      - name: sales_services
        description: 销售商品、提供劳务收到的现金。
        data_type: Nullable(Float64)
      - name: deposit_interbank_add
