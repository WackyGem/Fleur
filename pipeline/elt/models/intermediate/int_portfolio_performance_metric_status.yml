version: 2

models:
  - name: int_portfolio_performance_metric_status
    description: 指标级状态薄封装；解释 int_portfolio_performance_metric 中的 NULL 值。
    config:
      meta:
        grain_zh: 每个 portfolio run、attempt、benchmark、window、metric_name 一行。
        business_logic_zh:
          - 上游状态由 Rust portfolio worker 写入 fleur_calculation.calc_portfolio_performance_metric_status。
          - 本模型只过滤完整 result attempt，不重算或推断指标状态。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - portfolio_run_id
              - result_attempt_id
              - security_code
              - window_key
              - metric_name
    columns:
      - name: portfolio_run_id
        description: 组合 run 标识符。
        data_type: String
        data_tests:
          - not_null

      - name: result_attempt_id
        description: 仅追加的 result attempt 标识符。
        data_type: String
        data_tests:
          - not_null

      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: window_key
        description: 指标窗口键；第一版固定为 full_period。
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [full_period]

      - name: metric_name
        description: 绩效指标字段名。
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - holding_period_return
                  - annualized_return
                  - annualized_volatility
                  - max_drawdown
                  - calmar_ratio
                  - downside_deviation
                  - sortino_ratio
                  - sharpe_ratio
                  - information_ratio
                  - beta
                  - alpha
                  - treynor_ratio

      - name: metric_status
        description: 指标级计算状态。
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - succeeded
                  - insufficient_observations
                  - missing_benchmark
                  - missing_risk_free_rate
                  - zero_division
                  - invalid_input

      - name: reason_code
        description: 指标状态的原因码。
        data_type: String
        data_tests:
          - not_null

      - name: computed_at
        description: 状态计算完成时间，由 worker 写入时填入。
        data_type: DateTime
