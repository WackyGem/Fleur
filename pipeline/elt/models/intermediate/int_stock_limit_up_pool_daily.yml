version: 2
models:
  - name: int_stock_limit_up_pool_daily
    description: 同花顺涨停池日频 intermediate 模型，按股票和交易日透传 staging 层规范字段。
    config:
      meta:
        grain_zh: 每个交易日、每只进入同花顺涨停池的证券一行。
        business_logic_zh:
          - 直接透传 stg_ths__limit_up_pool_compacted。
          - 不解析 reason_type，不新增涨停排序或题材派生字段。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - trade_date
              - security_code
    columns:
      - name: trade_date
        description: '{{ doc(''field_trade_date'') }}'
        data_type: Date
        data_tests:
          - not_null
      - name: security_code
        description: '{{ doc(''field_security_code'') }}'
        data_type: Nullable(String)
        data_tests:
          - not_null
          - cn_security_code_format
      - name: security_name
        description: 同花顺股票名称，source-local。
        data_type: LowCardinality(String)
      - name: first_limit_up_time
        description: 股票当日首次涨停时间。
        data_type: DateTime('UTC')
        data_tests:
          - not_null
      - name: last_limit_up_time
        description: 股票当日最后一次涨停时间。
        data_type: DateTime('UTC')
        data_tests:
          - not_null
      - name: open_num
        description: 股票当日涨停后开板次数，0 值有效。
        data_type: Nullable(Int64)
      - name: limit_up_type
        description: 涨停类型分类。
        data_type: LowCardinality(String)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 换手板
                  - 一字板
                  - T字板
      - name: order_volume
        description: 涨停封单量，单位按 raw 保留。
        data_type: Float64
      - name: order_amount
        description: 涨停封单金额，单位按 raw 保留。
        data_type: Float64
      - name: is_new
        description: 是否为当日新进入涨停池的股票。
        data_type: Bool
      - name: is_again_limit
        description: 是否再次涨停。
        data_type: Bool
      - name: limit_up_success_rate
        description: 涨停成功率，profile 范围 0 至 1。
        data_type: Nullable(Float64)
      - name: currency_value
        description: 股票流通市值，单位按 raw 保留。
        data_type: Float64
      - name: market_id
        description: 同花顺市场标识。
        data_type: Int64
      - name: market_type
        description: 同花顺市场类型。
        data_type: LowCardinality(String)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - HS
                  - GEM
                  - STAR
      - name: change_rate
        description: 当日涨跌幅，单位按 raw 保留。
        data_type: Float64
      - name: turnover_rate
        description: 当日换手率，单位按 raw 保留。
        data_type: Float64
      - name: reason_type
        description: 涨停原因类型原文。
        data_type: String
      - name: high_days
        description: 连板或高度天数文本，例如首板、2天2板。
        data_type: LowCardinality(String)
      - name: high_days_value_raw
        description: 连板或高度天数原始数值，含义待确认。
        data_type: Int64
      - name: change_tag
        description: 同花顺涨跌幅标签。
        data_type: LowCardinality(String)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - LIMIT_BACK
                  - FIRST_LIMIT
      - name: latest_price
        description: 最新成交价格。
        data_type: Float64
