version: 2

models:
  - name: int_benchmark_returns_daily
    description: 组合绩效 benchmark 日收益 intermediate 模型；一行代表一个 benchmark 指数在一个交易日的价格指数日收益。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
          - relationships:
              arguments:
                to: ref('int_benchmark_basic_snapshot')
                field: security_code

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: close_price
        description: benchmark 交易日收盘点位。
        data_type: Nullable(Float64)

      - name: prev_close_price
        description: BaoStock 原始 preclose 口径的 benchmark 前收盘点位。
        data_type: Nullable(Float64)

      - name: return_daily
        description: benchmark 价格指数简单日收益，等于 close_price / prev_close_price - 1；前收盘点位缺失或小于等于 0 时为 NULL。
        data_type: Nullable(Float64)
