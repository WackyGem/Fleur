version: 2

models:
  - name: int_benchmark_basic_snapshot
    description: 组合绩效 benchmark 基础信息 intermediate 模型；一行代表一个当前允许的 benchmark 选中指数代码。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - benchmark_key
              - security_code
    columns:
      - name: benchmark_key
        description: 稳定 benchmark 业务 key，用于组合绩效配置和下游分析。
        data_type: String
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values:
                  - csi_a100
                  - csi_300
                  - csi_500
                  - csi_800
                  - csi_1000
                  - cnindex_1000

      - name: benchmark_name
        description: benchmark 中文名称，用于展示和指标 metadata。
        data_type: String
        data_tests:
          - not_null

      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
          - relationships:
              arguments:
                to: ref('int_index_basic_snapshot')
                field: security_code

      - name: security_local_code
        description: "{{ doc('field_security_local_code') }}"
        data_type: String
        data_tests:
          - not_null

      - name: exchange_code
        description: "{{ doc('field_exchange_code') }}"
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - SH
                  - SZ
                  - BJ

      - name: index_name
        description: BaoStock 当前快照中的指数名称。
        data_type: String
        data_tests:
          - not_null

      - name: listing_status
        description: BaoStock 当前快照上市状态标签。
        data_type: Enum8('delisted' = 0, 'listed' = 1)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - listed
                  - delisted

      - name: is_listed
        description: 当前快照是否上市，透传自指数基础信息；不代表历史任意交易日状态。
        data_type: Bool
        data_tests:
          - not_null
