version: 2

models:
  - name: int_benchmark_basic_snapshot
    description: 组合绩效 benchmark 基础信息 intermediate 模型；一行代表一个当前允许作为 benchmark 的指数代码。
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - unique
          - cn_security_code_format
          - accepted_values:
              arguments:
                values:
                  - 000903.SH
                  - 000300.SH
                  - 000905.SH
                  - 000906.SH
                  - 000852.SH
                  - 399311.SZ
          - relationships:
              arguments:
                to: ref('int_index_basic_snapshot')
                field: security_code

      - name: security_local_code
        description: "{{ doc('field_security_local_code') }}"
        data_type: String
        data_tests:
          - not_null

      - name: exchange_code
        description: "{{ doc('field_exchange_code') }}"
        data_type: String
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - SH
                  - SZ
                  - BJ

      - name: index_name
        description: BaoStock 当前快照中的指数名称，作为 benchmark 显示名。
        data_type: String
        data_tests:
          - not_null

      - name: listing_status
        description: BaoStock 当前快照上市状态标签。
        data_type: Enum8('delisted' = 0, 'listed' = 1)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - listed
                  - delisted

      - name: is_listed
        description: 当前快照是否上市，透传自指数基础信息；不代表历史任意交易日状态。
        data_type: Bool
        data_tests:
          - not_null
