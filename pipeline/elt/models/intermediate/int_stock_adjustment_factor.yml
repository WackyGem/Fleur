version: 2

models:
  - name: int_stock_adjustment_factor
    description: A 股股票日频复权因子 intermediate 模型；基于未复权行情中的实际前一交易日收盘价和 BaoStock preclose 口径计算前复权、后复权单步比例和累计因子。
    config:
      meta:
        grain_zh: 每证券、交易日一行。
        business_logic_zh:
          - backward_adjustment_ratio 使用 prev_close_price_unadj / prev_close_price。
          - forward_adjustment_ratio 使用 prev_close_price / prev_close_price_unadj。
          - 无效或缺失价格对统一视为 1.0，避免中断累计因子。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null

      - name: prev_close_price_unadj
        description: 前一交易日未复权收盘价，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: prev_close_price
        description: BaoStock 原始 preclose 口径的前收盘价，来自 int_stock_quotes_daily_unadj。
        data_type: Nullable(Float64)

      - name: backward_adjustment_ratio
        description: 后复权单步比例；无法有效计算时取 1.0。
        data_type: Float64
        data_tests:
          - not_null

      - name: backward_adjustment_factor
        description: 后复权累计因子。
        data_type: Float64
        data_tests:
          - not_null

      - name: forward_adjustment_ratio
        description: 前复权单步比例；无法有效计算时取 1.0。
        data_type: Float64
        data_tests:
          - not_null

      - name: forward_adjustment_factor
        description: 前复权累计因子。
        data_type: Float64
        data_tests:
          - not_null
