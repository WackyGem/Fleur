version: 2

models:
  - name: int_portfolio_closed_trade
    description: 已平仓交易明细薄封装；透传 Rust worker 输出的 FIFO 批次配对行，只派生 total_fee 和 realized_return。
    config:
      meta:
        grain_zh: 每个 closed_trade_id 一行。
        business_logic_zh:
          - 上游 closed trade ledger 由 Rust worker 输出，不由 dbt 从成交流水倒推。
          - 本模型只派生 total_fee 和 realized_return，不重建 lot 配对逻辑。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - closed_trade_id
    columns:
      - name: closed_trade_id
        description: 已平仓交易行稳定标识符。
        data_type: String
        data_tests:
          - not_null

      - name: portfolio_run_id
        description: 组合 run 标识符。
        data_type: String
        data_tests:
          - not_null

      - name: result_attempt_id
        description: 仅追加的 result attempt 标识符。
        data_type: String
        data_tests:
          - not_null

      - name: closed_trade_seq
        description: 已平仓交易在同一 result attempt 内的序号，按退出顺序递增。
        data_type: UInt32

      - name: position_lot_id
        description: FIFO 批次标识，指向建仓成交形成的持仓批次。
        data_type: String

      - name: entry_trade_seq
        description: 建仓成交序号，对应 portfolio_trade.trade_seq。
        data_type: UInt32

      - name: exit_trade_seq
        description: 平仓成交序号，对应 portfolio_trade.trade_seq。
        data_type: UInt32

      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: entry_date
        description: 建仓成交日期。
        data_type: Date

      - name: exit_date
        description: 平仓成交日期。
        data_type: Date

      - name: quantity
        description: 本批次平仓数量（股）。
        data_type: Float64

      - name: entry_gross_amount
        description: 建仓成交金额（不含费用）。
        data_type: Float64

      - name: exit_gross_amount
        description: 平仓成交金额（不含费用）。
        data_type: Float64

      - name: entry_fee
        description: 建仓成交总费用（佣金、印花税、过户费合计）。
        data_type: Float64

      - name: exit_fee
        description: 平仓成交总费用（佣金、印花税、过户费合计）。
        data_type: Float64

      - name: total_fee
        description: 本笔已平仓交易的总费用，派生为 entry_fee + exit_fee。
        data_type: Float64

      - name: realized_pnl
        description: 本笔已平仓交易实现的盈亏金额。
        data_type: Float64

      - name: realized_return
        description: 已平仓交易收益率，realized_pnl 除以 entry_gross_amount 加 entry_fee；分母为零时为 NULL。
        data_type: Nullable(Float64)

      - name: holding_days
        description: 持仓天数，由 exit_date 与 entry_date 相减得到。
        data_type: UInt32

      - name: exit_reason
        description: 平仓原因代码，如 signal、stop_loss、manual 等。
        data_type: String

      - name: created_at
        description: 记录写入时间，由 worker 写入时填入。
        data_type: DateTime
