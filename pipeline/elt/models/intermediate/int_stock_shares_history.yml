version: 2

models:
  - name: int_stock_shares_history
    description: 股票股本区间 intermediate 模型；将东方财富股本变动历史与前十大流通股东报告期合并为证券级股本有效区间，并估算 A 股自由流通股本。
    config:
      meta:
        grain_zh: 每证券、股本或大股东流通 A 股扣减变化生效日期一行。
        business_logic_zh:
          - effective_date 来自股本变动截止日或 A 股流通股东报告期。
          - expiry_date 为下一生效日前一天；NULL 表示该证券当前已知最新区间。
          - A 股股本 = 已上市流通 A 股 + 限售 A 股。
          - A 股自由流通股本 = A 股流通股本 - 持有流通 A 股比例超过 5% 的股东持股数量合计，结果下限钳制为 0。
          - 混合股份类别（如 A股,H股）无法拆分为 A 股流通持股，暂不纳入 A 股大股东扣减。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - effective_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: effective_date
        description: 股本区间生效开始日期，来自股本变动截止日或 A 股流通股东报告期。
        data_type: Date
        data_tests:
          - not_null

      - name: expiry_date
        description: 股本区间失效日期；为下一生效日前一天，NULL 表示该证券当前已知最新区间。
        data_type: Nullable(Date)

      - name: source_equity_end_date
        description: 本区间使用的最近一条东方财富股本变动记录截止日。
        data_type: Date
        data_tests:
          - not_null

      - name: source_freeholders_end_date
        description: 本区间使用的最近一个 A 股流通股东报告期；NULL 表示尚无可用报告期。
        data_type: Nullable(Date)

      - name: total_shares
        description: 总股本，单位为股，来自最近股本变动记录。
        data_type: Nullable(Float64)
        data_tests:
          - not_null

      - name: float_shares
        description: 流通股本，单位为股，对应东方财富无限售条件股份（已流通）。
        data_type: Nullable(Float64)

      - name: shares
        description: A 股股本，单位为股，由已上市流通 A 股与限售 A 股相加得到；与 total_shares（全市场总股本）区分。
        data_type: Nullable(Float64)

      - name: float_shares_a
        description: A 股流通股本，单位为股，对应东方财富已上市流通 A 股；与 float_shares（全市场无限售条件股份）区分。
        data_type: Nullable(Float64)

      - name: free_float_shares
        description: A 股自由流通股本估算值，单位为股，等于 A 股流通股本减去超过 5% 大股东持有的流通 A 股数量合计。
        data_type: Nullable(Float64)

      - name: major_holder_a_float_shares
        description: 持有流通 A 股比例超过 5% 的股东持股数量合计，单位为股；仅统计股份类别为 A股 的流通股东记录。
        data_type: Float64
        data_tests:
          - not_null

      - name: major_holder_count
        description: 纳入 A 股自由流通股本扣减的超过 5% 流通 A 股股东数量。
        data_type: UInt64
        data_tests:
          - not_null
