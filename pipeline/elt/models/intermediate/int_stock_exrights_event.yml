version: 2

models:
  - name: int_stock_exrights_event
    description: 股票除权除息事件 intermediate 模型；合并东方财富分红送转主表和配股事件，输出每股现金分红、送股、转增、配股组成和 XR/XD/DR 事件标签。
    config:
      meta:
        grain_zh: 每证券、除权除息日一行。
        business_logic_zh:
          - 分红送转仅保留实施方案、非不分配且除权除息日非空的记录。
          - 配股事件按除权除息日聚合后并入同一证券同日事件。
          - 权益组成统一转换为每 1 股口径，未匹配组成输出 0。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - ex_dividend_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format

      - name: ex_dividend_date
        description: 除权除息日，也是事件日期。
        data_type: Date
        data_tests:
          - not_null

      - name: equity_record_date
        description: 股权登记日；同事件多来源时取非空最小值。
        data_type: Nullable(Date)

      - name: notice_date
        description: 事件相关公告日；同事件多来源时取非空最大值。
        data_type: Nullable(Date)

      - name: report_date
        description: 分红送转报告期截止日；仅分红主表提供。
        data_type: Nullable(Date)

      - name: report_period_label
        description: 分红送转报告期标签，保留 source-local 文本。
        data_type: Nullable(String)

      - name: cash_dividend_per_share
        description: 每股派现金额，单位元，含税口径；没有现金分红时为 0。
        data_type: Float64
        data_tests:
          - not_null

      - name: bonus_share_per_share
        description: 每股送股数；没有送股时为 0。
        data_type: Float64
        data_tests:
          - not_null

      - name: transfer_share_per_share
        description: 每股转增股数；没有转增时为 0。
        data_type: Float64
        data_tests:
          - not_null

      - name: allotment_share_per_share
        description: 每股配股数；没有配股时为 0。
        data_type: Float64
        data_tests:
          - not_null

      - name: allotment_price_yuan
        description: 配股价格，单位元；仅配股来源提供。
        data_type: Nullable(Float64)

      - name: event_tag
        description: 除权除息事件标签，XR 表示除权，XD 表示除息，DR 表示除权除息同时发生。
        data_type: LowCardinality(String)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - XR
                  - XD
                  - DR

      - name: has_cash_dividend
        description: 是否包含现金分红。
        data_type: Bool
        data_tests:
          - not_null

      - name: has_share_right
        description: 是否包含送股、转增或配股权利。
        data_type: Bool
        data_tests:
          - not_null

      - name: source_has_dividend_main
        description: 是否来自分红送转主表。
        data_type: Bool
        data_tests:
          - not_null

      - name: source_has_allotment
        description: 是否来自配股事件表。
        data_type: Bool
        data_tests:
          - not_null

      - name: source_plan_text
        description: 用于解析现金、送股、转增的分红送转原始文本。
        data_type: Nullable(String)

      - name: source_allotment_text
        description: 用于解析配股比例的配股原始文本。
        data_type: Nullable(String)
