version: 2

models:
  - name: stg_baostock__query_history_k_data_plus_daily
    description: BaoStock 日频 K 线 staging 模型。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - trade_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
        config:
          meta:
            glossary_key: security_code
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: code
            normalization:
              macro: normalize_cn_security_code
              input_format: baostock_prefix

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            glossary_key: trade_date
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: date

      - name: open_price
        description: 交易日开盘价。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: open

      - name: high_price
        description: 交易日最高价。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: high

      - name: low_price
        description: 交易日最低价。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: low

      - name: close_price
        description: 交易日收盘价。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: close

      - name: previous_close_price
        description: 上一交易日收盘价。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: preclose

      - name: volume
        description: 交易日成交量。
        data_type: Nullable(Int64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: volume

      - name: amount
        description: 交易日成交金额。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: amount

      - name: adjust_flag
        description: BaoStock 复权标记。
        data_type: Int8
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: adjustflag

      - name: turnover_rate
        description: 交易日换手率。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: turn

      - name: trade_status
        description: BaoStock 交易状态码。
        data_type: Int8
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1]
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: tradestatus

      - name: is_st
        description: 是否 ST 或风险警示。
        data_type: Nullable(Bool)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: isST

      - name: pct_change
        description: 交易日涨跌幅。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: pctChg
