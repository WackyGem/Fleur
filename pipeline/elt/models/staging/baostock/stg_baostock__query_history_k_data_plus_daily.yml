version: 2

models:
  - name: stg_baostock__query_history_k_data_plus_daily
    description: BaoStock daily K-line rows with canonical A-share security and trade-date fields.
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
        config:
          meta:
            glossary_key: security_code
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: code
            normalization:
              macro: normalize_cn_security_code
              input_format: baostock_prefix

      - name: security_local_code
        description: "{{ doc('field_security_local_code') }}"
        data_type: String
        config:
          meta:
            glossary_key: security_local_code
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: code
            normalization:
              macro: cn_security_local_code
              input_format: baostock_prefix

      - name: exchange_code
        description: "{{ doc('field_exchange_code') }}"
        data_type: String
        data_tests:
          - accepted_values:
              arguments:
                values: ["SH", "SZ", "BJ"]
        config:
          meta:
            glossary_key: exchange_code
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: code
            normalization:
              macro: cn_exchange_code
              input_format: baostock_prefix

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            glossary_key: trade_date
            source_columns:
              - source: raw
                table: baostock__query_history_k_data_plus_daily
                column: date
