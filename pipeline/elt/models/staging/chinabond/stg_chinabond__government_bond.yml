version: 2

models:
  - name: stg_chinabond__government_bond
    description: ChinaBond 国债收益率曲线 staging 模型。
    columns:
      - name: trade_date
        description: ChinaBond 国债收益率曲线日期，来自 raw `work_date`。
        data_type: Date
        data_tests:
          - not_null
          - unique
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: chinabond__government_bond
                column: work_date

      - name: three_month_yield_pct
        description: 3 个月国债收益率，单位为百分比点。
        data_type: Nullable(Float64)
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: chinabond__government_bond
                column: three_month_yield_pct
            unit: percent
            scale: percent_value_not_fraction

