version: 2

models:
  - name: stg_jiuyan__action_field_compacted
    description: 韭研题材异动明细 staging 模型。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - action_field_id
              - security_code
    columns:
      - name: action_field_id
        description: 题材异动记录 ID。
        data_type: String
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: action_field_id

      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
        config:
          meta:
            glossary_key: security_code
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: code
            normalization:
              macro: normalize_cn_security_code
              input_format: compact_prefix

      - name: trade_date
        description: "{{ doc('field_trade_date') }}"
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            glossary_key: trade_date
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: date

      - name: action_field_name
        description: 题材异动名称。
        data_type: String
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: name

      - name: reason
        description: 题材异动原因。
        data_type: Nullable(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: reason

      - name: sort_no
        description: 展示排序号。
        data_type: Int64
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: sort_no

      - name: is_delete
        description: 删除标记。
        data_type: Bool
        data_tests:
          - accepted_values:
              arguments:
                values: [false]
                quote: false
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: is_delete

      - name: create_time
        description: 记录创建时间。
        data_type: DateTime
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: create_time

      - name: related_count
        description: 关联对象数量。
        data_type: Int64
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: count

      - name: event_time
        description: 关联证券事件时间。
        data_type: Nullable(Time)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: time

      - name: limit_board_text
        description: 连板描述文本。
        data_type: LowCardinality(Nullable(String))
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: num

      - name: limit_days
        description: 连板天数。
        data_type: Nullable(Int64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: day

      - name: limit_boards
        description: 连板板数。
        data_type: Nullable(Int64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: edition

      - name: expound
        description: 补充说明。
        data_type: String
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: jiuyan__action_field_compacted
                column: expound
