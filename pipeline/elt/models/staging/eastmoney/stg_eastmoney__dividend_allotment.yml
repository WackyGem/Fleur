version: 2

models:
  - name: stg_eastmoney__dividend_allotment
    description: 东方财富配股事件 staging 模型。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - notice_date
              - event_explain
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
        config:
          meta:
            glossary_key: security_code
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: SECUCODE
            normalization:
              macro: normalize_cn_security_code
              input_format: eastmoney_suffix

      - name: security_name_abbr
        description: 证券简称。
        data_type: String
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: SECURITY_NAME_ABBR

      - name: notice_date
        description: 公告日期。
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: NOTICE_DATE

      - name: equity_record_date
        description: 股权登记日。
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: EQUITY_RECORD_DATE

      - name: ex_dividend_date
        description: 除权除息日。
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: EX_DIVIDEND_DATEE

      - name: issue_num
        description: 配股数量。
        data_type: Float64
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: ISSUE_NUM

      - name: total_raise_funds
        description: 募集资金总额。
        data_type: Float64
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: TOTAL_RAISE_FUNDS

      - name: issue_price
        description: 配股价格。
        data_type: Float64
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: ISSUE_PRICE

      - name: event_explain
        description: 配股方案说明。
        data_type: LowCardinality(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_allotment
                column: EVENT_EXPLAIN
