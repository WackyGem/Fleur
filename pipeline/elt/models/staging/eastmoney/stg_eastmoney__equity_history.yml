version: 2

models:
  - name: stg_eastmoney__equity_history
    description: EastMoney equity-history rows with canonical A-share security and report-date fields.
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
        config:
          meta:
            glossary_key: security_code
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: SECUCODE
            normalization:
              macro: normalize_cn_security_code
              input_format: eastmoney_suffix

      - name: security_local_code
        description: "{{ doc('field_security_local_code') }}"
        data_type: String
        config:
          meta:
            glossary_key: security_local_code
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: SECUCODE
            normalization:
              macro: cn_security_local_code
              input_format: eastmoney_suffix

      - name: exchange_code
        description: "{{ doc('field_exchange_code') }}"
        data_type: String
        data_tests:
          - accepted_values:
              arguments:
                values: ["SH", "SZ", "BJ"]
        config:
          meta:
            glossary_key: exchange_code
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: SECUCODE
            normalization:
              macro: cn_exchange_code
              input_format: eastmoney_suffix

      - name: report_date
        description: "{{ doc('field_report_date') }}"
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            glossary_key: report_date
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: END_DATE
