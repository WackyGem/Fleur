version: 2

models:
  - name: stg_eastmoney__equity_history
    description: 东方财富股本变动历史 staging 模型。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - end_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
        config:
          meta:
            glossary_key: security_code
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: SECUCODE
            normalization:
              macro: normalize_cn_security_code
              input_format: eastmoney_suffix

      - name: end_date
        description: 股本变动截止日。
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: END_DATE

      - name: notice_date
        description: 公告披露日。
        data_type: Date
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: NOTICE_DATE

      - name: listing_date
        description: 上市流通日期。
        data_type: Date
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: LISTING_DATE

      - name: change_reason
        description: 股本变动原因。
        data_type: LowCardinality(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: CHANGE_REASON

      - name: change_reason_explain
        description: 股本变动原因说明。
        data_type: LowCardinality(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: CHANGE_REASON_EXPLAIN

      - name: total_shares
        description: 总股本。
        data_type: Float64
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: TOTAL_SHARES

      - name: limited_shares
        description: 有限售股份。
        data_type: Float64
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: LIMITED_SHARES

      - name: unlimited_shares
        description: 无限售股份。
        data_type: Float64
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: UNLIMITED_SHARES

      - name: listed_a_shares
        description: A 股流通股。
        data_type: Float64
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: LISTED_A_SHARES

      - name: limited_a_shares
        description: A 股限售股。
        data_type: Float64
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: LIMITED_A_SHARES
