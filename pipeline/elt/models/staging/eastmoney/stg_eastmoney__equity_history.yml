version: 2

models:
  - name: stg_eastmoney__equity_history
    description: 东方财富股本变动历史 staging 模型，完整透传 raw 层股本结构字段。
    data_tests:
      - unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - security_code
              - report_date
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
        config:
          meta:
            glossary_key: security_code
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: SECUCODE
            normalization:
              macro: normalize_cn_security_code
              input_format: eastmoney_suffix

      - name: security_local_code
        description: "{{ doc('field_security_local_code') }}"
        data_type: String
        data_tests:
          - not_null
        config:
          meta:
            glossary_key: security_local_code
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: SECURITY_CODE
            normalization:
              macro: cn_security_local_code
              input_format: a_share_local_code

      - name: org_code
        description: 机构代码。
        data_type: LowCardinality(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: ORG_CODE

      - name: report_date
        description: "{{ doc('field_report_date') }}"
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            glossary_key: report_date
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: END_DATE

      - name: change_reason
        description: 变动原因。
        data_type: LowCardinality(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: CHANGE_REASON

      - name: limited_shares
        description: 有限售条件股份。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: LIMITED_SHARES

      - name: unlimited_shares
        description: 无限售条件股份（已流通）。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: UNLIMITED_SHARES

      - name: total_shares
        description: 总股本。
        data_type: Nullable(Float64)
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: TOTAL_SHARES

      - name: limited_shares_ratio
        description: 限售股比例（%）。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__equity_history
                column: LIMITED_SHARES_RATIO
            unit: percent
            scale: percent_value_not_fraction

      - name: listed_shares_ratio
