version: 2
models:
- name: stg_eastmoney__income_ytd
  description: 东方财富利润表年初至报告期末累计 staging 模型。
  data_tests:
  - unique_combination_of_columns:
      arguments:
        combination_of_columns:
        - security_code
        - report_date
  columns:
  - name: security_code
    description: '{{ doc(''field_security_code'') }}'
    data_type: String
    data_tests:
    - not_null
    - cn_security_code_format
    config:
      meta:
        glossary_key: security_code
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: SECUCODE
        normalization:
          macro: normalize_cn_security_code
          input_format: eastmoney_suffix
  - name: security_local_code
    description: '{{ doc(''field_security_local_code'') }}'
    data_type: String
    data_tests:
    - not_null
    config:
      meta:
        glossary_key: security_local_code
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: SECURITY_CODE
        normalization:
          macro: cn_security_local_code
          input_format: a_share_local_code
  - name: security_name_abbr
    description: 证券简称。
    data_type: LowCardinality(String)
    config:
      meta:
        dictionary_scope: local
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: SECURITY_NAME_ABBR
  - name: org_code
    description: 机构代码。
    data_type: LowCardinality(String)
    config:
      meta:
        dictionary_scope: local
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: ORG_CODE
  - name: org_type
    description: 机构类型。
    data_type: LowCardinality(String)
    data_tests:
    - accepted_values:
        arguments:
          values:
          - 通用
          - 证券
          - 银行
          - 保险
    config:
      meta:
        dictionary_scope: local
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: ORG_TYPE
  - name: report_date
    description: 报告期。
    data_type: Date
    data_tests:
    - not_null
    config:
      meta:
        dictionary_scope: local
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: REPORT_DATE
  - name: report_type
    description: 报告类型。
    data_type: LowCardinality(String)
    data_tests:
    - not_null
    - accepted_values:
        arguments:
          values:
          - 一季报
          - 中报
          - 三季报
          - 年报
    config:
      meta:
        dictionary_scope: local
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: REPORT_TYPE
  - name: report_date_name
    description: 报告期名称。
    data_type: LowCardinality(String)
    config:
      meta:
        dictionary_scope: local
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: REPORT_DATE_NAME
  - name: security_type_code
    description: 证券类型代码。
    data_type: LowCardinality(String)
    config:
      meta:
        dictionary_scope: local
        source_columns:
        - source: raw
          table: eastmoney__income_ytd
          column: SECURITY_TYPE_CODE
  - name: notice_date
    description: 公告日期。
    data_type: Date
    data_tests:
