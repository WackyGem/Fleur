version: 2

models:
  - name: stg_eastmoney__dividend_main
    description: 东方财富分红主表 staging 模型。
    columns:
      - name: security_code
        description: "{{ doc('field_security_code') }}"
        data_type: String
        data_tests:
          - not_null
          - cn_security_code_format
        config:
          meta:
            glossary_key: security_code
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: SECUCODE
            normalization:
              macro: normalize_cn_security_code
              input_format: eastmoney_suffix

      - name: security_name_abbr
        description: 证券简称。
        data_type: LowCardinality(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: SECURITY_NAME_ABBR

      - name: notice_date
        description: 公告日期。
        data_type: Date
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: NOTICE_DATE

      - name: report_period_label
        description: 报告期标签。
        data_type: LowCardinality(String)
        data_tests:
          - not_null
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: REPORT_DATE

      - name: report_time
        description: 报告期截止日。
        data_type: Nullable(Date)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: REPORT_TIME

      - name: assign_progress
        description: 分配进度。
        data_type: LowCardinality(String)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 董事会预案
                  - 实施方案
                  - 股东大会预案
                  - 预披露
                  - 股东大会否决
                  - 董事会决议未通过
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: ASSIGN_PROGRESS

      - name: is_unassign
        description: 是否不分配。
        data_type: Bool
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: IS_UNASSIGN

      - name: impl_plan_profile
        description: 分红方案简述。
        data_type: LowCardinality(Nullable(String))
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: IMPL_PLAN_PROFILE

      - name: impl_plan_newprofile
        description: 方案进度简述。
        data_type: LowCardinality(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: IMPL_PLAN_NEWPROFILE

      - name: new_profile
        description: 含税方案文本。
        data_type: LowCardinality(Nullable(String))
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: NEW_PROFILE

      - name: assign_object
        description: 分配对象。
        data_type: LowCardinality(Nullable(String))
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: ASSIGN_OBJECT

      - name: equity_record_date
        description: 股权登记日。
        data_type: Nullable(Date)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: EQUITY_RECORD_DATE

      - name: ex_dividend_date
        description: 除权除息日。
        data_type: Nullable(Date)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: EX_DIVIDEND_DATE

      - name: pay_cash_date
        description: 派息日。
        data_type: Nullable(Date)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: PAY_CASH_DATE

      - name: gmdecision_notice_date
        description: 股东大会决议公告日。
        data_type: Nullable(Date)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: GMDECISION_NOTICE_DATE

      - name: annual_general_meeting_date
        description: 年度股东大会日期。
        data_type: Nullable(Date)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: DAT_YAGGR

      - name: info_code
        description: 公告编号。
        data_type: Nullable(String)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: INFO_CODE

      - name: total_dividend
        description: 分红总额。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: TOTAL_DIVIDEND

      - name: total_dividend_a
        description: A 股分红总额。
        data_type: Nullable(Float64)
        config:
          meta:
            dictionary_scope: local
            source_columns:
              - source: raw
                table: eastmoney__dividend_main
                column: TOTAL_DIVIDEND_A
