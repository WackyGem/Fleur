dataset: baostock__query_history_k_data_plus_daily
version: 1
owner: data
grain: one row per stock code per trade date
source_asset_key:
- source
- baostock__query_history_k_data_plus_daily
raw_asset_key:
- clickhouse
- raw
- baostock__query_history_k_data_plus_daily
external:
  provider: baostock
  source_table_name: baostock__query_history_k_data_plus_daily
  source_description_zh: BaoStock 日频行情数据
source:
  protocol: tcp
  payload_format: tabular
  fields:
  - name: date
    type: string
    required: true
    external_description_zh: BaoStock 行情接口返回的交易日期。
  - name: code
    type: string
    required: true
    external_description_zh: BaoStock 行情接口返回的证券代码。
  - name: open
    type: string
    required: true
    external_description_zh: 交易日开盘价。
  - name: high
    type: string
    required: true
    external_description_zh: 交易日最高价。
  - name: low
    type: string
    required: true
    external_description_zh: 交易日最低价。
  - name: close
    type: string
    required: true
    external_description_zh: 交易日收盘价。
  - name: preclose
    type: string
    required: true
    external_description_zh: 上一交易日收盘价。
  - name: volume
    type: string
    required: true
    external_description_zh: 交易日成交量。
  - name: amount
    type: string
    required: true
    external_description_zh: 交易日成交金额。
  - name: adjustflag
    type: string
    required: true
    external_description_zh: 行情复权标记，用于区分不复权、前复权和后复权。
  - name: turn
    type: string
    required: true
    external_description_zh: 交易日换手率。
  - name: tradestatus
    type: string
    required: true
    external_description_zh: 交易日交易状态。
  - name: pctChg
    type: string
    required: true
    external_description_zh: 交易日涨跌幅。
  - name: isST
    type: string
    required: true
    external_description_zh: 证券是否为 ST 或风险警示状态。
