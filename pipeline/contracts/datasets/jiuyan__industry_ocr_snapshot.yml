dataset: jiuyan__industry_ocr_snapshot
version: 1
owner: data
grain: one row per OCR result row per industry image
source_asset_key:
- source
- jiuyan__industry_ocr_snapshot
raw_asset_key:
- clickhouse
- raw
- jiuyan__industry_ocr_snapshot
external:
  provider: jiuyan
  source_table_name: jiuyan__industry_ocr_snapshot
  source_description_zh: 韭研 OCR 成功结果快照
source:
  protocol: generated
  payload_format: tabular
  fields:
  - name: industry_id
    type: N/A
    required: true
    external_description_zh: 行业研究记录标识
  - name: image_filename
    type: N/A
    required: true
    external_description_zh: OCR 来源图片文件名。
  - name: image_index
    type: N/A
    required: true
    external_description_zh: OCR 来源图片在批次中的序号。
  - name: ocr_row_index
    type: N/A
    required: true
    external_description_zh: OCR 结果在图片中的行序号。
  - name: stock_name
    type: string
    required: true
    external_description_zh: OCR 识别出的股票名称。
  - name: theme_path
    type: string
    required: true
    external_description_zh: OCR 识别出的题材或主题路径。
  - name: relation
    type: string
    required: true
    external_description_zh: OCR 识别出的股票与题材关系说明。
  - name: source
    type: string
    required: true
    external_description_zh: OCR 结果对应的来源文件或来源渠道。
parquet:
  storage_mode: latest_snapshot
  fields:
  - name: industry_id
    type: string
    nullable: false
  - name: image_filename
    type: string
    nullable: false
  - name: image_index
    type: int32
    nullable: false
  - name: ocr_row_index
    type: int32
    nullable: false
  - name: stock_name
    type: string
    nullable: false
  - name: theme_path
    type: string
    nullable: false
  - name: relation
    type: string
    nullable: true
  - name: source
    type: string
    nullable: true
clickhouse_raw:
  database: fleur_raw
  table: jiuyan__industry_ocr_snapshot
  partition_strategy: snapshot
  engine: MergeTree
  partition_by: tuple()
  order_by:
  - industry_id
  - image_filename
  - ocr_row_index
  allow_empty: false
  sync_enabled: true
  fields:
  - name: industry_id
    type: String
    from: industry_id
    nullable: false
  - name: image_filename
    type: String
    from: image_filename
    nullable: false
  - name: image_index
    type: Int32
    from: image_index
    nullable: false
  - name: ocr_row_index
    type: Int32
    from: ocr_row_index
    nullable: false
  - name: stock_name
    type: LowCardinality(String)
    from: stock_name
    nullable: false
    reason: expected_low_cardinality_dimension
  - name: theme_path
    type: String
    from: theme_path
    nullable: false
  - name: relation
    type: String
    from: relation
    nullable: true
  - name: source
    type: LowCardinality(String)
    from: source
    nullable: true
    reason: expected_low_cardinality_dimension
dataset_note_zh: 韭研 OCR 成功结果快照
validation_notes:
- Initial contract migrated from docs/references/data_dict and current raw sync specs.
- Downstream snapshot contract consumes source-only asset source/jiuyan__industry_ocr.
- 'String type decision on S3 parquet
  source/jiuyan__industry_ocr_snapshot/000000_0.parquet: rows=1228;
  industry_id nonnull=1228 uniq=63 unique_rate=0.051303, theme_path
  nonnull=1228 uniq=267 unique_rate=0.217427, relation nonnull=1228
  uniq=866 unique_rate=0.705212. industry_id and theme_path use ClickHouse
  String by explicit schema decision for this raw table; relation is
  high-uniqueness relationship text and also uses ClickHouse String. Parquet
  schema remains string.'
