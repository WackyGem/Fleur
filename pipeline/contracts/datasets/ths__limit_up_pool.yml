dataset: ths__limit_up_pool
version: 1
owner: data
grain: one row per stock code per source trade date
source_asset_key:
- source
- ths__limit_up_pool
external:
  provider: ths
  source_table_name: ths__limit_up_pool
  source_description_zh: 同花顺涨停池每日 source 分区
source:
  protocol: http
  payload_format: json
  fields:
  - name: date
    type: string
    required: true
    external_description_zh: 同花顺涨停池对应的交易日期。
  - name: open_num
    type: number
    required: true
    external_description_zh: 股票当日涨停后开板次数。
  - name: first_limit_up_time
    type: string
    required: true
    external_description_zh: 股票当日首次涨停时间。
  - name: last_limit_up_time
    type: string
    required: true
    external_description_zh: 股票当日最后一次涨停时间。
  - name: code
    type: string
    required: true
    external_description_zh: 同花顺涨停池中的证券代码。
  - name: limit_up_type
    type: string
    required: true
    external_description_zh: 同花顺涨停类型分类。
  - name: order_volume
    type: number
    required: true
    external_description_zh: 涨停封单量。
  - name: is_new
    type: number
    required: true
    external_description_zh: 是否为当日新进入涨停池的股票。
  - name: limit_up_suc_rate
    type: number
    required: true
    external_description_zh: 涨停成功率。
  - name: currency_value
    type: number
    required: true
    external_description_zh: 股票流通市值。
  - name: market_id
    type: number
    required: true
    external_description_zh: 同花顺市场标识。
  - name: is_again_limit
    type: number
    required: true
    external_description_zh: 是否再次涨停。
  - name: change_rate
    type: number
    required: true
    external_description_zh: 当日涨跌幅。
  - name: turnover_rate
    type: number
    required: true
    external_description_zh: 当日换手率。
  - name: reason_type
    type: string
    required: true
    external_description_zh: 涨停原因类型。
  - name: order_amount
    type: number
    required: true
    external_description_zh: 涨停封单金额。
  - name: high_days
    type: string
    required: true
    external_description_zh: 连板或高度天数文本。
  - name: name
    type: string
    required: true
    external_description_zh: 股票名称。
  - name: high_days_value
    type: number
    required: true
    external_description_zh: 连板或高度天数数值。
  - name: change_tag
    type: string
    required: true
    external_description_zh: 涨跌幅标签。
  - name: market_type
    type: string
    required: true
    external_description_zh: 市场类型。
  - name: latest
    type: number
    required: true
    external_description_zh: 最新成交价格。
parquet:
  storage_mode: partitioned
  partition_key_name: trade_date
  fields:
  - name: date
    type: date32[day]
    nullable: false
  - name: open_num
    type: int64
    nullable: true
  - name: first_limit_up_time
    type: timestamp[ns, tz=UTC]
    nullable: false
  - name: last_limit_up_time
    type: timestamp[ns, tz=UTC]
    nullable: false
  - name: code
    type: string
    nullable: false
  - name: limit_up_type
    type: string
    nullable: false
  - name: order_volume
    type: double
    nullable: false
  - name: is_new
    type: bool
    nullable: false
  - name: limit_up_suc_rate
    type: double
    nullable: true
  - name: currency_value
    type: double
    nullable: false
  - name: market_id
    type: int64
    nullable: false
  - name: is_again_limit
    type: bool
    nullable: false
  - name: change_rate
    type: double
    nullable: false
  - name: turnover_rate
    type: double
    nullable: false
  - name: reason_type
    type: string
    nullable: false
  - name: order_amount
    type: double
    nullable: false
  - name: high_days
    type: string
    nullable: false
  - name: name
    type: string
    nullable: false
  - name: high_days_value
    type: int64
    nullable: false
  - name: change_tag
    type: string
    nullable: false
  - name: market_type
    type: string
    nullable: false
  - name: latest
    type: double
    nullable: false
dataset_note_zh: 同花顺涨停池每日 source 分区；该 source-only asset 不直接同步 ClickHouse raw。
validation_notes:
- Source-only contract added by Plan 0020 Phase 3 from Dagster THS_LIMIT_UP_POOL_SCHEMA.
