dataset: jiuyan__action_field
version: 1
owner: data
grain: one row per stock code per source trade date/action field row
source_asset_key:
- source
- jiuyan__action_field
external:
  provider: jiuyan
  source_table_name: jiuyan__action_field
  source_description_zh: 韭研题材异动每日 source 分区
source:
  protocol: http
  payload_format: json
  fields:
  - name: action_field_id
    type: string
    required: true
    external_description_zh: 韭研题材异动记录唯一标识。
  - name: name
    type: string
    required: true
    external_description_zh: 韭研题材异动名称。
  - name: date
    type: string
    required: true
    external_description_zh: 韭研题材异动对应的交易日期。
  - name: reason
    type: string
    required: true
    external_description_zh: 韭研题材异动形成或归类原因。
  - name: sort_no
    type: integer
    required: true
    external_description_zh: 韭研题材异动展示排序号。
  - name: is_delete
    type: string
    required: true
    external_description_zh: 韭研题材异动记录是否被标记为删除。
  - name: delete_time
    type: string
    required: true
    external_description_zh: 韭研题材异动记录删除时间。
  - name: create_time
    type: string
    required: true
    external_description_zh: 韭研题材异动记录创建时间。
  - name: update_time
    type: string
    required: true
    external_description_zh: 韭研题材异动记录更新时间。
  - name: count
    type: integer
    required: true
    external_description_zh: 韭研题材异动关联对象数量。
  - name: code
    type: string
    required: true
    external_description_zh: 题材异动关联的证券代码。
  - name: time
    type: string
    required: true
    external_description_zh: 题材异动关联证券的事件时间。
  - name: num
    type: string
    required: true
    external_description_zh: 题材异动关联证券的连板数量描述。
  - name: price
    type: integer
    required: true
    external_description_zh: 题材异动关联证券的价格数值。
  - name: day
    type: integer
    required: true
    external_description_zh: 题材异动关联证券的连板天数。
  - name: edition
    type: integer
    required: true
    external_description_zh: 题材异动关联证券的连板板数。
  - name: shares_range
    type: number
    required: true
    external_description_zh: 题材异动关联证券的股份区间数值。
  - name: expound
    type: string
    required: true
    external_description_zh: 题材异动关联证券的补充说明。
parquet:
  storage_mode: partitioned
  partition_key_name: trade_date
  fields:
  - name: action_field_id
    type: string
    nullable: false
  - name: name
    type: string
    nullable: false
  - name: date
    type: date32[day]
    nullable: false
  - name: reason
    type: string
    nullable: true
  - name: sort_no
    type: int64
    nullable: false
  - name: is_delete
    type: bool
    nullable: false
  - name: delete_time
    type: timestamp[ms]
    nullable: true
  - name: create_time
    type: timestamp[ms]
    nullable: false
  - name: update_time
    type: timestamp[ms]
    nullable: true
  - name: count
    type: int64
    nullable: false
  - name: code
    type: string
    nullable: false
  - name: time
    type: time32[ms]
    nullable: true
  - name: num
    type: string
    nullable: true
  - name: price
    type: int64
    nullable: false
  - name: day
    type: int64
    nullable: true
  - name: edition
    type: int64
    nullable: true
  - name: shares_range
    type: double
    nullable: false
  - name: expound
    type: string
    nullable: false
dataset_note_zh: 韭研题材异动每日 source 分区；该 source-only asset 不直接同步 ClickHouse raw。
validation_notes:
- Source-only contract added by Plan 0020 Phase 3 from Dagster JIUYAN_ACTION_FIELD_SCHEMA.
