validation_notes:
- Initial contract migrated from docs/references/data_dict and current raw sync specs.
- REPORT_TIME intentionally remains string because historical responses can contain labels such
  as 1991年报 rather than ISO date strings.
- 'LowCardinality review from EastMoney dividend_main 2025 notice-date first
  page sample: INFO_CODE nonnull=500 uniq=497 unique_rate=0.994000.
  INFO_CODE is a high-cardinality announcement identifier and uses ClickHouse
  String. Parquet schema remains string.'
