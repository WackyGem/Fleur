  description: Ocr row index.
open:
  name: open
  description_zh: 交易标的在交易日开盘时的价格。
  description: Open.
out_date:
  name: out_date
  description_zh: 证券退市或终止上市日期。
  description: Out date.
pct_chg:
  name: pct_chg
  description_zh: 交易标的相对上一交易日的涨跌幅比例。
  description: Pct chg.
preclose:
  name: preclose
  description_zh: 交易标的上一交易日的收盘价格。
  description: Preclose.
relation:
  name: relation
  description_zh: 记录之间或主题之间的关联说明。
  description: Relation.
sort_no:
  name: sort_no
  description_zh: 来源系统用于展示或处理的排序序号。
  description: Sort no.
source:
  name: source
  description_zh: 记录来源系统、渠道或原始文件来源。
  description: Source.
status:
  name: status
  description_zh: 记录或业务对象在来源系统中的状态。
  description: Status.
stock_name:
  name: stock_name
  description_zh: 股票或证券的中文简称。
  description: Stock name.
stock_status:
  name: stock_status
  description_zh: 证券上市、退市或暂停交易等状态。
  description: Stock status.
stock_type:
  name: stock_type
  description_zh: 证券品种类型，例如股票、指数或其他市场品种。
  description: Stock type.
theme_path:
  name: theme_path
  description_zh: 题材或主题在来源系统中的层级路径。
  description: Theme path.
title:
  name: title
  description_zh: 内容标题。
  description: Title.
title_bold:
  name: title_bold
  description_zh: 标题是否在来源系统中加粗展示。
  description: Title bold.
title_red:
  name: title_red
  description_zh: 标题是否在来源系统中红色高亮展示。
  description: Title red.
trade_date:
  name: trade_date
  description_zh: A 股市场交易日日期。
  description: Trade date.
tradestatus:
  name: tradestatus
  description_zh: 证券在交易日内的交易状态。
  description: Tradestatus.
turn:
  name: turn
  description_zh: 交易日换手率。
  description: Turn.
update_time:
  name: update_time
  description_zh: 记录在来源系统中的最后更新时间。
  description: Update time.
volume:
  name: volume
  description_zh: 交易日内成交数量或成交量。
  description: Volume.
