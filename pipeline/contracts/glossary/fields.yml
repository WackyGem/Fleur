adjustflag:
  name: adjustflag
  description_zh: 行情价格的复权处理标记，用于区分不复权、前复权和后复权口径。
  description: Adjustflag.
amount:
  name: amount
  description_zh: 交易日内成交金额，通常以人民币计价。
  description: Amount.
author:
  name: author
  description_zh: 内容发布或维护人员名称。
  description: Author.
browsers_count:
  name: browsers_count
  description_zh: 内容被浏览或阅读的次数。
  description: Browsers count.
close:
  name: close
  description_zh: 交易标的在交易日收盘时的价格。
  description: Close.
code:
  name: code
  description_zh: 证券、行业或业务对象在来源系统中的编码。
  description: Code.
code_name:
  name: code_name
  description_zh: 证券、行业或业务对象的显示名称。
  description: Code name.
content:
  name: content
  description_zh: 正文内容或说明文本。
  description: Content.
create_time:
  name: create_time
  description_zh: 记录在来源系统中的创建时间。
  description: Create time.
delete_time:
  name: delete_time
  description_zh: 记录在来源系统中的删除时间；未删除时通常为空。
  description: Delete time.
forward_count:
  name: forward_count
  description_zh: 内容被转发或分享的次数。
  description: Forward count.
high:
  name: high
  description_zh: 交易标的在交易日内达到的最高价格。
  description: High.
image_filename:
  name: image_filename
  description_zh: 来源图片在本地或对象存储中的文件名。
  description: Image filename.
image_index:
  name: image_index
  description_zh: 同一批图片中的图片顺序编号。
  description: Image index.
imgs:
  name: imgs
  description_zh: 内容关联的图片列表或图片地址集合。
  description: Imgs.
industry_id:
  name: industry_id
  description_zh: 行业研究记录在来源系统中的唯一标识。
  description: Industry id.
ipo_date:
  name: ipo_date
  description_zh: 证券首次上市交易日期。
  description: Ipo date.
is_delete:
  name: is_delete
  description_zh: 记录是否已被来源系统标记为删除。
  description: Is delete.
is_st:
  name: is_st
  description_zh: 证券是否处于 ST 或风险警示状态。
