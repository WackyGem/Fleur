                            last_limit_up_time:
                              type: string
                              description: 最后涨停时间 (Unix timestamp)
                            code:
                              type: string
                              description: 股票代码
                            limit_up_type:
                              type: string
                              description: 涨停类型（如 "换手板"）
                            order_volume:
                              type: number
                              description: 封单量 (手)
                            is_new:
                              type: number
                              description: 是否新股 (1=是)
                            limit_up_suc_rate:
                              type: number
                              description: 涨停成功率
                            currency_value:
                              type: number
                              description: 流通市值 (元)
                            market_id:
                              type: number
                              description: 市场 ID
                            is_again_limit:
                              type: number
                              description: 是否回封 (1=是)
                            change_rate:
                              type: number
                              description: 涨跌幅 (%)
                            turnover_rate:
                              type: number
                              description: 换手率 (%)
                            reason_type:
                              type: string
                              description: 涨停原因标签
                            order_amount:
                              type: number
                              description: 封单金额 (元)
                            high_days:
                              type: string
                              description: 连板天数描述（如 "首板"）
                            name:
