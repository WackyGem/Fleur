                              description: 变动标签（如 "LIMIT_BACK"）
                            market_type:
                              type: string
                              description: 市场类型（"HS"=沪深）
                            latest:
                              type: number
                              description: 最新价
                            time_preview:
                              type: array
                              items:
                                type: number
                              description: 分时涨跌幅预览数组
                        description: 涨停个股明细数组
                      limit_up_count:
                        type: object
                        properties:
                          today:
                            type: object
                            properties:
                              num:
                                type: number
                                description: 今日涨停数
                              history_num:
                                type: number
                                description: 今日历史涨停数
                              rate:
                                type: number
                                description: 今日涨停比率
                              open_num:
                                type: number
                                description: 开板次数
                            description: 今日涨停统计
                          yesterday:
                            type: object
                            properties:
                              num:
                                type: number
                                description: 昨日涨停数
                              history_num:
                                type: number
                                description: 昨日历史涨停数
                              rate:
                                type: number
                                description: 昨日涨停比率
                              open_num:
                                type: number
                                description: 开板次数
                            description: 昨日涨停统计
                        description: 涨停统计
                      limit_down_count:
                        type: object
                        properties:
                          today:
                            type: object
                            properties:
                              num:
                                type: number
                                description: 今日跌停数
                              history_num:
                                type: number
                                description: 今日历史跌停数
                              rate:
                                type: number
                                description: 今日跌停比率
                              open_num:
                                type: number
                                description: 开板次数
                            description: 今日跌停统计
                          yesterday:
                            type: object
                            properties:
                              num:
                                type: number
                                description: 昨日跌停数
                              history_num:
                                type: number
                                description: 昨日历史跌停数
                              rate:
                                type: number
                                description: 昨日跌停比率
                              open_num:
                                type: number
                                description: 开板次数
                            description: 昨日跌停统计
                        description: 跌停统计
                      date:
                        type: string
                        description: 查询日期
                      msg:
                        type: number
                        nullable: true
                        description: 状态消息
                      trade_status:
                        type: object
                        properties:
                          id:
                            type: string
                            description: 状态标识（"no_open"=未开盘）
                          name:
                            type: string
                            description: 状态名称
                          start_time:
                            type: string
                            description: 状态开始时间
                          end_time:
                            type: string
                            description: 状态结束时间
                        description: 交易状态
                    description: 返回数据
                  status_msg:
                    type: string
                    description: 状态消息
