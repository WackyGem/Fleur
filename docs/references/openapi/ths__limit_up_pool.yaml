openapi: 3.0.0
info:
  title: 同花顺 涨停板数据
  description: '同花顺涨停板池接口。无需认证，GET 请求。

    需要 User-Agent 等浏览器 headers，否则返回 403。

    注意: date 参数格式为 YYYYMMDD，省略则返回当天数据。


    ## 数据保留

    服务端最大保留 **380 天**数据。超出后返回 `status_code: -1, status_msg: "date参数不合法"`。


    ## 响应结构

    - `page.count` = **总页数**（非当前页记录数），当前页记录数 = `len(data.info[])`

    - 非交易日返回 `status_code: 0` 但 `info: []`, `total: 0`，同时返回 `yesterday` 统计

    - 有效 filter: `HS`(沪深), `GEM2STAR`(创业板+科创板), `HS,GEM2STAR`(全部)

    - `SH`/`SZ`/`BJ` 不是有效 filter 值

    '
  version: 1.0.0
servers:
- url: https://data.10jqka.com.cn
  description: The default server
paths:
  /dataapi/limit_up/limit_up_pool:
    get:
      summary: 获取涨停板数据
      operationId: getLimitUpPool
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: number
      - name: limit
        in: query
        required: false
        schema:
          type: number
      - name: field
        in: query
        required: false
        schema:
          type: string
      - name: filter
        in: query
        required: false
        schema:
          type: string
      - name: order_field
        in: query
        required: false
        schema:
          type: number
      - name: order_type
        in: query
        required: false
        schema:
          type: number
      - name: date
        in: query
        required: false
        schema:
          type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                    description: 状态码，0 = 成功，-1 = 参数错误
                  data:
                    type: object
                    properties:
                      page:
                        type: object
                        properties:
                          limit:
                            type: number
                            description: 每页记录数
                          total:
                            type: number
                            description: 总记录数
                          count:
                            type: number
                            description: 当前页返回记录数
                          page:
                            type: number
                            description: 当前页码
                        description: 当前页码
                      info:
                        type: array
                        items:
                          type: object
                          properties:
                            open_num:
                              type: number
                              description: 开板次数
                            first_limit_up_time:
                              type: string
