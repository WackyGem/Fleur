openapi: 3.0.0
info:
  title: 东方财富 F10 资产负债表
  description: "东方财富数据中心 — 资产负债表接口。\n无需认证，直接 GET 请求。\n使用 `data/get`（无版本号），参数名为 `type`/`sty`/`p`/`ps`/`sr`/`st`。\n\n## Filter\
    \ DSL\n`filter` 参数使用 DataCenter DSL 查询表达式，多个条件直接拼接。\n- 按证券代码: `(SECUCODE=\"601088.SH\")`\n- 按证券代码批量: `(SECUCODE in (\"\
    601088.SH\",\"000001.SZ\"))`\n- 按报告期区间: `(REPORT_DATE>='2025-01-01')(REPORT_DATE<='2025-12-31')`\n- 按公告日期区间: `(NOTICE_DATE>='2025-01-01')(NOTICE_DATE<='2025-12-31')`\n\
    - 按报告期精确匹配: `(REPORT_DATE in ('2025-12-31','2025-09-30'))`\n\n## 排序\n- 单字段排序: `st=REPORT_DATE&sr=-1`\n- 多字段排序: `st=REPORT_DATE,SECURITY_CODE&sr=-1,-1`\n\
    - **警告**: 仅用 REPORT_DATE 单字段排序时，日期区间查询 + 多股票场景下，\n  同一报告期记录跨越分页边界会导致分页数据重复。\n  始终添加第二排序字段（如 SECURITY_CODE）避免此问题。\n\n##\
    \ 注意事项\n- filter 参数值需正确 URL 编码（单引号 `%27`，双引号 `%22`）\n- `>=`/`<=` 操作符需配合正确编码才可用\n- 响应无 `code`/`success`/`message` 包装字段\n"
  version: 1.1.0
servers:
- url: https://datacenter.eastmoney.com
  description: The default server
