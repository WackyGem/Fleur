      parameters:
      - name: type
        in: query
        required: true
        description: 报表标识，固定值 RPT_F10_FINANCE_GBALANCE
        schema:
          type: string
          example: RPT_F10_FINANCE_GBALANCE
      - name: sty
        in: query
        required: true
        description: 返回字段样式，固定值 F10_FINANCE_GBALANCE
        schema:
          type: string
          example: F10_FINANCE_GBALANCE
      - name: filter
        in: query
        required: true
        description: 'DataCenter DSL 过滤条件，多个条件直接拼接。

          - 按证券代码: `(SECUCODE="601088.SH")`

          - 按证券代码批量: `(SECUCODE in ("601088.SH","000001.SZ"))`

          - 按报告期区间: `(REPORT_DATE>=''2025-01-01'')(REPORT_DATE<=''2025-12-31'')`

          - 按公告日期区间: `(NOTICE_DATE>=''2025-01-01'')(NOTICE_DATE<=''2025-12-31'')`

          - 按报告期精确匹配: `(REPORT_DATE in (''2025-12-31'',''2025-09-30''))`

          注意: 参数值需正确 URL 编码。

          '
        schema:
          type: string
          example: (SECUCODE="601088.SH")
      - name: p
        in: query
        required: true
        description: 页码，从 1 开始
        schema:
          type: integer
          example: 1
      - name: ps
        in: query
        required: true
        description: 每页条数
        schema:
          type: integer
          example: 5
      - name: sr
        in: query
        required: true
        description: '排序方向，-1 降序，1 升序。

          支持多字段排序，逗号分隔，与 st 一一对应。

          示例: `-1`（单字段）或 `-1,-1`（多字段）

          '
        schema:
          type: string
          example: '-1'
      - name: st
        in: query
        required: true
        description: '排序字段，支持多字段排序，逗号分隔。

          建议始终使用多字段排序（如 REPORT_DATE,SECURITY_CODE）避免分页重复。

          单字段 REPORT_DATE 排序在日期区间 + 多股票场景下会导致分页数据重复。

          '
        schema:
          type: string
          example: REPORT_DATE,SECURITY_CODE
      - name: source
        in: query
        required: true
        description: 数据来源标识
        schema:
          type: string
          example: HSF10
      - name: client
        in: query
        required: true
        description: 客户端标识
        schema:
          type: string
          example: PC
      - name: v
        in: query
        required: false
        description: 缓存破坏参数（时间戳数字）
        schema:
          type: string
