<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="100%" height="100%" style="background:#f8fafc;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <defs>
    <filter id="shadow-card" x="-3%" y="-6%" width="106%" height="112%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <filter id="shadow-soft" x="-4%" y="-10%" width="108%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>

    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="6" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-right" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>

    <linearGradient id="grad-source" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <linearGradient id="grad-pipeline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="grad-model" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
    <linearGradient id="grad-compute" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="grad-workbench" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="#f8fafc" />

  <g>
    <text x="600" y="42" font-size="28" font-weight="800" fill="#0f172a" text-anchor="middle">Fleur 沪深 A 股投研平台架构</text>
    <text x="600" y="72" font-size="14" font-weight="500" fill="#64748b" text-anchor="middle">数据自采自洽 · 技术指标计算 · 规则选股 · 策略回测 · 组合运行监控</text>
    <line x1="320" y1="92" x2="880" y2="92" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6" />
  </g>

  <!-- Layer 1: source abstraction -->
  <g transform="translate(0, 115)">
    <rect x="40" y="0" width="1120" height="120" rx="8" fill="#ffffff" filter="url(#shadow-card)" />
    <text x="70" y="30" font-size="16" font-weight="700" fill="#1e293b">📡 数据采集层</text>
    <text x="200" y="30" font-size="13" font-weight="500" fill="#64748b">公开互联网数据源输入</text>

    <g transform="translate(0, 50)">
      <rect x="70" y="0" width="245" height="48" rx="8" fill="url(#grad-source)" filter="url(#shadow-soft)" />
      <text x="192.5" y="21" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">市场行情</text>
      <text x="192.5" y="38" font-size="12" fill="#dbeafe" text-anchor="middle">日 K 线 · 基础证券信息</text>

      <rect x="335" y="0" width="245" height="48" rx="8" fill="url(#grad-source)" filter="url(#shadow-soft)" />
      <text x="457.5" y="21" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">财务与权益</text>
      <text x="457.5" y="38" font-size="12" fill="#dbeafe" text-anchor="middle">财报 · 分红 · 股本结构</text>

      <rect x="600" y="0" width="245" height="48" rx="8" fill="url(#grad-source)" filter="url(#shadow-soft)" />
      <text x="722.5" y="21" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">市场日历与利率</text>
      <text x="722.5" y="38" font-size="12" fill="#dbeafe" text-anchor="middle">交易日历 · 无风险利率</text>

      <rect x="865" y="0" width="245" height="48" rx="8" fill="url(#grad-source)" filter="url(#shadow-soft)" />
      <text x="987.5" y="21" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">事件与题材</text>
      <text x="987.5" y="38" font-size="12" fill="#dbeafe" text-anchor="middle">涨停池 · 热点 · OCR</text>
    </g>
  </g>

  <g>
    <line x1="192.5" y1="235" x2="192.5" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-down)" />
    <line x1="457.5" y1="235" x2="457.5" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-down)" />
    <line x1="722.5" y1="235" x2="722.5" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-down)" />
    <line x1="987.5" y1="235" x2="987.5" y2="258" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-down)" />
  </g>

  <!-- Layer 2: pipeline -->
  <g transform="translate(0, 260)">
    <rect x="40" y="0" width="1120" height="125" rx="8" fill="#ffffff" filter="url(#shadow-card)" />
    <text x="70" y="30" font-size="16" font-weight="700" fill="#1e293b">⚙️ 数据资产管理</text>
    <text x="210" y="30" font-size="13" font-weight="500" fill="#64748b">Dagster 编排采集、分区、回填和 raw 同步</text>

    <rect x="70" y="55" width="300" height="52" rx="8" fill="url(#grad-pipeline)" filter="url(#shadow-soft)" />
    <text x="220" y="78" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Dagster Source Assets</text>
    <text x="220" y="95" font-size="12" fill="#d1fae5" text-anchor="middle">调度 · 分区 · 观测</text>

    <rect x="450" y="55" width="300" height="52" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow-soft)" />
    <text x="600" y="78" font-size="15" font-weight="700" fill="#047857" text-anchor="middle">S3 / RustFS Parquet</text>
    <text x="600" y="95" font-size="12" fill="#047857" text-anchor="middle">zstd 压缩 · 可重放源层对象</text>

    <rect x="830" y="55" width="300" height="52" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="2" filter="url(#shadow-soft)" />
    <text x="980" y="78" font-size="15" font-weight="700" fill="#047857" text-anchor="middle">ClickHouse Raw Sync</text>
    <text x="980" y="95" font-size="12" fill="#047857" text-anchor="middle">raw 校验 · 分区替换</text>

    <line x1="370" y1="81" x2="440" y2="81" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-right)" />
    <line x1="750" y1="81" x2="820" y2="81" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-right)" />
  </g>

  <line x1="600" y1="385" x2="600" y2="408" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-down)" />

  <!-- Layer 3: modeling -->
  <g transform="translate(0, 410)">
    <rect x="40" y="0" width="1120" height="160" rx="8" fill="#ffffff" filter="url(#shadow-card)" />
    <text x="70" y="30" font-size="16" font-weight="700" fill="#1e293b">🗄️ 数据建模与治理</text>
    <text x="220" y="30" font-size="13" font-weight="500" fill="#64748b">contracts 约束 raw，dbt 提供稳定消费层</text>

    <rect x="70" y="50" width="270" height="52" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" filter="url(#shadow-soft)" />
    <text x="205" y="73" font-size="15" font-weight="700" fill="#1d4ed8" text-anchor="middle">Contracts</text>
    <text x="205" y="90" font-size="12" fill="#2563eb" text-anchor="middle">字段事实 · schema · sources</text>

    <rect x="370" y="50" width="360" height="52" rx="8" fill="url(#grad-model)" filter="url(#shadow-soft)" />
    <text x="550" y="73" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">dbt on ClickHouse</text>
    <text x="550" y="90" font-size="12" fill="#cffafe" text-anchor="middle">清洗 · 组合 · wrapper · marts</text>

    <rect x="760" y="50" width="370" height="52" rx="8" fill="#ecfeff" stroke="#22d3ee" stroke-width="2" filter="url(#shadow-soft)" />
    <text x="945" y="73" font-size="15" font-weight="700" fill="#0e7490" text-anchor="middle">ClickHouse 分层仓库</text>
    <text x="945" y="90" font-size="12" fill="#0e7490" text-anchor="middle">面向分析、应用和服务查询</text>

    <g transform="translate(0, 116)">
      <rect x="100" y="0" width="160" height="30" rx="8" fill="#f0f9ff" stroke="#bae6fd" />
      <text x="180" y="20" font-size="13" font-weight="700" fill="#0369a1" text-anchor="middle">raw</text>

      <rect x="285" y="0" width="160" height="30" rx="8" fill="#f0f9ff" stroke="#bae6fd" />
      <text x="365" y="20" font-size="13" font-weight="700" fill="#0369a1" text-anchor="middle">staging</text>

      <rect x="470" y="0" width="160" height="30" rx="8" fill="#f0f9ff" stroke="#bae6fd" />
      <text x="550" y="20" font-size="13" font-weight="700" fill="#0369a1" text-anchor="middle">intermediate</text>

      <rect x="655" y="0" width="160" height="30" rx="8" fill="#f0f9ff" stroke="#bae6fd" />
      <text x="735" y="20" font-size="13" font-weight="700" fill="#0369a1" text-anchor="middle">calculation</text>

      <rect x="840" y="0" width="160" height="30" rx="8" fill="#f0f9ff" stroke="#bae6fd" />
      <text x="920" y="20" font-size="13" font-weight="700" fill="#0369a1" text-anchor="middle">marts</text>
    </g>
  </g>

  <g>
    <line x1="360" y1="570" x2="360" y2="592" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-down)" />
    <line x1="840" y1="570" x2="840" y2="592" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-down)" />
  </g>

  <!-- Layer 4: compute and services -->
  <g transform="translate(0, 595)">
    <rect x="40" y="0" width="1120" height="130" rx="8" fill="#ffffff" filter="url(#shadow-card)" />
    <text x="70" y="30" font-size="16" font-weight="700" fill="#1e293b">🔥 计算引擎与后端服务</text>
    <text x="250" y="30" font-size="13" font-weight="500" fill="#64748b">Rust 计算、策略 API 和异步 worker</text>

    <rect x="70" y="50" width="330" height="62" rx="8" fill="url(#grad-compute)" filter="url(#shadow-soft)" />
    <text x="235" y="74" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">Furnace</text>
    <text x="235" y="94" font-size="12" fill="#f5d0fe" text-anchor="middle">KDJ · RSI · MACD · BOLL · MA</text>

    <rect x="435" y="50" width="330" height="62" rx="8" fill="url(#grad-compute)" filter="url(#shadow-soft)" />
    <text x="600" y="74" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">Rearview API</text>
    <text x="600" y="94" font-size="12" fill="#f5d0fe" text-anchor="middle">规则选股 · 回测控制面 · 组合发布</text>

    <rect x="800" y="50" width="330" height="62" rx="8" fill="url(#grad-compute)" filter="url(#shadow-soft)" />
    <text x="965" y="74" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">Portfolio Worker</text>
    <text x="965" y="94" font-size="12" fill="#f5d0fe" text-anchor="middle">净值 · 绩效 · 交易质量评价</text>
  </g>

  <line x1="600" y1="725" x2="600" y2="742" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-down)" />

  <!-- Layer 5: workbench -->
  <g transform="translate(0, 745)">
    <rect x="40" y="0" width="1120" height="65" rx="8" fill="#ffffff" filter="url(#shadow-card)" />
    <text x="70" y="38" font-size="16" font-weight="700" fill="#1e293b">🖥️ Racingline 工作台</text>

    <rect x="260" y="13" width="870" height="40" rx="8" fill="url(#grad-workbench)" filter="url(#shadow-soft)" />

    <g transform="translate(282, 22)">
      <rect x="0" y="0" width="118" height="22" rx="8" fill="#fffbeb" />
      <text x="59" y="15" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">策略创建</text>

      <rect x="133" y="0" width="118" height="22" rx="8" fill="#fffbeb" />
      <text x="192" y="15" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">股池预览</text>

      <rect x="266" y="0" width="118" height="22" rx="8" fill="#fffbeb" />
      <text x="325" y="15" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">策略回测</text>

      <rect x="399" y="0" width="118" height="22" rx="8" fill="#fffbeb" />
      <text x="458" y="15" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">组合发布</text>

      <rect x="532" y="0" width="118" height="22" rx="8" fill="#fffbeb" />
      <text x="591" y="15" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">组合监控</text>

      <rect x="665" y="0" width="160" height="22" rx="8" fill="#fffbeb" />
      <text x="745" y="15" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">订阅组合运行</text>
    </g>
  </g>
</svg>
