metrics:
  - logical_metric: close_price
    source:
      mart_table: mart_stock_quotes_daily
      column_name: close_price
    value_kind: numeric
    allow_filter: true
    allow_scoring: true
    allowed_ops: [lt, lte, gt, gte, between, eq, ne, is_null]
    null_policy: no_match
    default_output: true

