op_profiles:
  numeric_filter: [lt, lte, gt, gte, between, eq, ne, is_null]
  boolean_filter: [eq, ne, is_null]
  string_filter: [eq, ne, is_null]

defaults:
  numeric_metric:
    value_kind: numeric
    allow_filter: true
    allow_scoring: true
    allowed_ops_profile: numeric_filter
    null_policy: no_match
  numeric_dependency:
    value_kind: numeric
    allow_filter: false
    allow_scoring: false
    allowed_ops: []
    null_policy: no_match
  boolean_metric:
    value_kind: boolean
    allow_filter: true
    allow_scoring: false
    allowed_ops_profile: boolean_filter
    null_policy: no_match
  string_metric:
    value_kind: string
    allow_filter: true
    allow_scoring: false
    allowed_ops_profile: string_filter
    null_policy: no_match

metrics:
  - logical_metric: close_price
    source: {mart_table: mart_stock_quotes_daily, column_name: close_price}
    extends: numeric_metric
    default_output: true
    display: {group: quotes, label_zh: 收盘价, sort_order: 10}

  - logical_metric: close_price_forward_adj
    source: {mart_table: mart_stock_quotes_daily, column_name: close_price_forward_adj}
    extends: numeric_metric
    default_output: true
    display: {group: quotes, label_zh: 前复权收盘价, sort_order: 20}

  - logical_metric: prev_volume
